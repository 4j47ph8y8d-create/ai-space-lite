<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>造梦 · 商城</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 430px; height: 100vh; max-height: 780px; background: #faf0f0; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        :root { --bg-primary: #faf0f0; --bg-secondary: #fff5f5; --bg-card: #ffffff; --text-primary: #3a2a2a; --text-secondary: #a08080; --border-color: rgba(255,107,129,0.12); --shadow-color: rgba(255,107,129,0.08); --header-bg: rgba(255,248,248,0.95); --pink-primary: #ff6b81; --pink-light: #fce4ec; --pink-gradient: linear-gradient(135deg, #ff6b81, #ee5a24); }
        .screen-mall { width: 100%; height: 100%; background: var(--bg-primary); display: flex; flex-direction: column; }
        .mall-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 10px 14px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; min-height: 50px; }
        .mall-header .back-btn { font-size: 20px; color: #576b95; cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 6px; }
        .mall-header .title i { color: #ff6b81; }
        .mall-header .mall-actions { display: flex; align-items: center; gap: 6px; }
        .mall-header .mall-balance { font-size: 12px; color: var(--text-secondary); background: rgba(255,107,129,0.1); padding: 3px 10px; border-radius: 14px; border: 1px solid rgba(255,107,129,0.15); cursor: pointer; transition: 0.15s; font-weight: 500; }
        .mall-header .mall-balance:active { transform: scale(0.95); }
        .mall-header .mall-balance span { color: #ff6b81; font-weight: 700; }
        .mall-header .mall-cart-btn { background: none; border: none; font-size: 18px; color: var(--text-primary); cursor: pointer; position: relative; padding: 4px; }
        .mall-header .mall-cart-btn .cart-count { position: absolute; top: -4px; right: -4px; background: #ff6b81; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .mall-header .mall-cart-btn .cart-count.empty { display: none; }
        .mall-header .mall-invite-btn { background: var(--pink-gradient); border: none; color: #fff; padding: 4px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; white-space: nowrap; box-shadow: 0 2px 8px rgba(255,107,129,0.25); }
        .mall-header .mall-invite-btn:active { transform: scale(0.95); }
        .mall-header .mall-invite-btn.inviting { background: #a29bfe; }
        .mall-tabs { background: var(--header-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; flex-shrink: 0; }
        .mall-tab { flex: 1; text-align: center; padding: 10px 0 8px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.15s; }
        .mall-tab.active { color: #ff6b81; border-bottom-color: #ff6b81; }
        .mall-tab:active { opacity: 0.6; }
        .mall-body { flex: 1; overflow-y: auto; padding: 10px 12px 16px; position: relative; background: var(--bg-primary); }
        .mall-body::-webkit-scrollbar { width: 3px; }
        .mall-body::-webkit-scrollbar-thumb { background: rgba(255,107,129,0.3); border-radius: 4px; }
        .mall-product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .mall-product-card { background: var(--bg-card); border-radius: 14px; padding: 8px 8px 10px; box-shadow: 0 2px 10px var(--shadow-color); transition: 0.15s; display: flex; flex-direction: column; cursor: pointer; position: relative; border: 1px solid rgba(255,107,129,0.04); }
        .mall-product-card:active { transform: scale(0.97); }

        .mall-product-card .product-tag { position: absolute; top: 6px; left: 6px; font-size: 9px; background: rgba(255,107,129,0.85); color: #fff; padding: 1px 8px; border-radius: 8px; font-weight: 500; }

        .mall-order-header .order-sub-tab:active { transform: scale(0.95); }
        .mall-order-list { flex: 1; overflow-y: auto; padding-bottom: 10px; }
        .mall-order-item { background: var(--bg-card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 6px var(--shadow-color); border-left: 4px solid #ff6b81; }
        .mall-order-item .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .mall-order-item .order-id { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-time { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-status { font-size: 11px; font-weight: 600; padding: 1px 10px; border-radius: 10px; }
        .mall-order-item .order-status.status-pending { background: #fdcb6e; color: #5a3d1a; }
        .mall-order-item .order-status.status-done { background: #ff6b81; color: #fff; }
        .mall-order-item .order-items { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
        .mall-order-item .order-items .oi-gift-tag { color: #a29bfe; font-weight: 500; margin-left: 4px; }
        .mall-order-item .order-total { font-size: 14px; font-weight: 600; color: #ff6b81; text-align: right; margin-top: 2px; }
        .mall-order-item .order-direction { font-size: 11px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .mall-order-item .order-direction .dir-icon { color: #ff6b81; }
        .mall-detail-overlay { position: absolute; inset: 0; z-index: 30; background: var(--bg-primary); display: none; flex-direction: column; animation: fadeInUp 0.25s ease; border-radius: 32px; overflow: hidden; }
        .mall-detail-overlay.active { display: flex; }
        .mall-detail-header { background: var(--header-bg); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-height: 48px; }
        .mall-detail-header .back-btn { font-size: 20px; color: #576b95; cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-detail-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .mall-detail-body .detail-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 12px; }
        .mall-detail-body .detail-img img { width: 100%; height: 100%; object-fit: cover; }

        .mall-detail-footer { display: flex; gap: 10px; padding: 12px 16px; background: var(--header-bg); border-top: 1px solid var(--border-color); flex-shrink: 0; }

        .mall-detail-footer .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }

function addGiftMessageToRoleDirect(roleId, direction, giftData) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) { showToast('⚠️ 未找到主应用数据'); return false; }
        var data = JSON.parse(raw);
        var r = data.roles.find(function(ro) { return ro.id === roleId; });
        if (!r) { showToast('⚠️ 未找到该角色'); return false; }

        var msgId = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        var timeStr = new Date().toLocaleTimeString();
        var msg = {
            id: msgId,
            role: direction === 'sent' ? 'user' : 'assistant',
            type: 'gift',
            time: timeStr,
            giftData: {
                productName: giftData.productName || '礼物',
                price: giftData.price || 0,
                desc: giftData.desc || '',
                note: giftData.note || '一份心意',
                roleId: direction === 'sent' ? giftData.targetRoleId : roleId,
                roleName: direction === 'sent' ? (giftData.targetRoleName || 'TA') : r.name,
                targetRoleName: direction === 'sent' ? r.name : '你',
                status: direction === 'sent' ? 'done' : 'pending',
            }
        };
        if (!Array.isArray(r.messages)) r.messages = [];
        r.messages.push(msg);

        if (direction === 'received') {
            if (!data.config) data.config = {};
            if (!data.config.unreadCount) data.config.unreadCount = {};
            data.config.unreadCount[roleId] = (data.config.unreadCount[roleId] || 0) + 1;
        }

        // 心跳飙升（收到礼物时）
        if (direction === 'received') {
            if (!r.heartData) r.heartData = { value: 65, restingValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
            var spikeVal = Math.min(99, (r.heartData.value || 65) + 10 + Math.floor(Math.random() * 5));
            r.heartData.value = spikeVal;
            r.heartData.peakValue = spikeVal;
            r.heartData.recentTrigger = '🎁 收到了「' + giftData.productName + '」';
            if (data.config.heart && data.config.heart.bindRoleId === roleId) {
                data.config.heart.value = spikeVal;
                data.config.heart.peakValue = spikeVal;
                data.config.heart.recentTrigger = '🎁 收到了「' + giftData.productName + '」';
            }
            if (!Array.isArray(r.memory)) r.memory = [];
            r.memory.push({ text: '🎁 ' + r.name + ' 送了我「' + giftData.productName + '」', sourceMessageId: msgId });
        }

        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        return true;
    } catch (e) {
        console.error('插入礼物消息失败:', e);
        return false;
    }
}

            role: 'assistant',

        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        return true;
    } catch (e) {
        console.error('插入回复失败:', e);

function loadProducts() {
    fetch('./products.json').then(function(resp) {
        if (!resp.ok) throw new Error('加载失败');
        return resp.json();
    }).then(function(data) {
        var all = data.products || [];
        mallProducts = all.filter(function(p) { return p.category === '推荐' || !p.category; });
        mallTakeoutProducts = all.filter(function(p) { return p.category === '外卖'; });
        if (mallProducts.length === 0) mallProducts = DEFAULT_PRODUCTS.slice();
        if (mallTakeoutProducts.length === 0) mallTakeoutProducts = DEFAULT_TAKEOUT.slice();
        renderAll();
    }).catch(function(e) {
        mallProducts = DEFAULT_PRODUCTS.slice();
        mallTakeoutProducts = DEFAULT_TAKEOUT.slice();
        renderAll();
    });
}

function restoreShoppingTogether() {
    if (shoppingTogether.isActive && shoppingTogether.roleId) {
        var role = getRoleById(shoppingTogether.roleId);
        if (role) {
            var inviteBtn = document.getElementById('mallInviteBtn');
            inviteBtn.textContent = '💕 ' + role.name + ' 一起逛';
            inviteBtn.classList.add('inviting');
            showToast('💕 已恢复和 ' + role.name + ' 的逛街');
        } else {
            shoppingTogether.isActive = false;
            saveMallData();
        }
    }
}

function renderCategories() {
    var filter = document.getElementById('categoryFilter');
    if (!filter) return;
    var tags = ['全部'];
    mallProducts.forEach(function(p) {
        if (p.tag && tags.indexOf(p.tag) === -1) tags.push(p.tag);
    });
    var html = '<button class="cat-btn active" data-cat="全部">全部</button>';
    tags.slice(1, 6).forEach(function(tag) {
        html += '<button class="cat-btn" data-cat="' + tag + '">' + tag + '</button>';
    });
    filter.innerHTML = html;
    filter.querySelectorAll('.cat-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            filter.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            var cat = this.dataset.cat;
            var filtered = cat === '全部' ? mallProducts : mallProducts.filter(function(p) { return p.tag === cat; });
            renderProducts(filtered);
        });
    });
}

function renderProducts(products) {
    var grid = document.getElementById('mallProductGrid');
    if (!grid) return;

        grid.innerHTML = '<div class="mall-empty"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
        return;
    }
    var html = '';
    products.forEach(function(p) {

    grid.querySelectorAll('.mall-product-card').forEach(function(el) {

function renderOrderRoleSelector() {
    var sel = document.getElementById('orderRoleSelector');
    if (!sel) return;
    var roles = loadRolesFromMain();
    sel.innerHTML = '';
    if (roles.length === 0) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '暂无角色';
        sel.appendChild(opt);
        return;
    }
    roles.forEach(function(r) {
        var opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
    });
    if (currentOrderRoleId && roles.find(function(r) { return r.id === currentOrderRoleId; })) {
        sel.value = currentOrderRoleId;
    } else {
        sel.value = roles[0].id;
        currentOrderRoleId = roles[0].id;
    }
    sel.addEventListener('change', function() {
        currentOrderRoleId = this.value;
        renderOrders();
    });
}

function renderOrders() {
    var list = document.getElementById('mallOrderList');
    if (!list) return;
    var roles = loadRolesFromMain();
    var role = roles.find(function(r) { return r.id === currentOrderRoleId; });
    if (!role) {
        list.innerHTML = '<div class="mall-empty"><i class="fas fa-user"></i><p>请选择一个角色</p></div>';
        return;
    }
    var filtered = mallOrders.filter(function(o) {
        if (currentOrderSubTab === 'received') return o.roleId === role.id && o.mode === 'ai_gift';
        else return o.roleId === role.id && o.mode === 'gift';
    });
    if (filtered.length === 0) {
        var msg = currentOrderSubTab === 'received' ? '还没有收到礼物' : '还没有送出礼物';
        list.innerHTML = '<div class="mall-empty"><i class="fas fa-gift"></i><p>' + msg + '</p></div>';
        return;
    }
    var html = '';
    filtered.slice().reverse().forEach(function(order) {
        var statusMap = { 'pending': '待收', 'done': '已收' };
        var statusClass = { 'pending': 'status-pending', 'done': 'status-done' };
        var itemsText = order.productName + ' ×' + order.qty;
        var dirText = currentOrderSubTab === 'received' ? '收到来自 ' + (order.roleName || role.name) : '送出送给 ' + (order.roleName || role.name);

function selectTargetRoleSync() {
    return new Promise(function(resolve) {
        var roles = loadRolesFromMain();
        if (roles.length === 0) { showToast('⚠️ 暂无角色'); resolve(null); return; }
        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');
        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:#ff6b81;';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');
        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                var role = roles.find(function(r) { return r.id === btn.dataset.id; });
                resolve(role);
            };
        });
        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
            resolve(null);
        };
    });
}

function purchaseProduct(product, qty, note, mode) {
    var totalPrice = product.price * qty;
    var currentRole = getCurrentRoleFromMain();
    if (mode === 'gift') {
        selectTargetRoleSync().then(function(selected) {
            if (!selected) return;
            selectedRoleForGift = selected;
            executePurchase(product, qty, note, mode, selected, totalPrice);
        });
        return;
    }
    if (!currentRole) { showToast('⚠️ 请先在主应用中创建角色'); return; }
    executePurchase(product, qty, note, mode, currentRole, totalPrice);
}

function executePurchase(product, qty, note, mode, targetRole, totalPrice) {
    if (!targetRole) { showToast('⚠️ 请选择角色'); return; }
    if (mallBalance < totalPrice) { showToast('💰 余额不足'); return; }
    if (!confirm('💝 确定送给 ' + targetRole.name + '「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice)) return;

    mallBalance -= totalPrice;
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id, productName: product.name, productImage: product.image,
        price: product.price, qty: qty, total: totalPrice, note: note || '',
        mode: mode, roleName: targetRole.name, roleId: targetRole.id,
        status: 'pending', giftFromAi: false,
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    saveMallData();
    closeDetail();
    updateUI();
    showToast('🎁 已送给 ' + targetRole.name + '！');

    var giftData = {
        productName: product.name,
        price: product.price,
        desc: product.description || '',
        note: note || '一份心意',
        targetRoleId: targetRole.id,
        targetRoleName: targetRole.name,
    };
    addGiftMessageToRoleDirect(targetRole.id, 'sent', giftData);
    triggerHeartSpikeForGift(targetRole, product, 'gift');
    triggerGiftChatReplyDirect(targetRole, product, note);
}

// ============================================================
//  心跳 + AI 回复
// ============================================================
function triggerHeartSpikeForGift(role, product, mode) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        var r = data.roles.find(function(ro) { return ro.id === role.id; });
        if (!r) return;
        if (!r.heartData) r.heartData = { value: 65, restingValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
        var spike = mode === 'gift' ? 15 : 10;
        var newVal = Math.min(99, (r.heartData.value || 65) + spike + Math.floor(Math.random() * 5));
        r.heartData.value = newVal;
        r.heartData.peakValue = newVal;
        r.heartData.recentTrigger = '💝 送出了「' + product.name + '」';
        if (data.config && data.config.heart && data.config.heart.bindRoleId === role.id) {
            data.config.heart.value = newVal;
            data.config.heart.peakValue = newVal;
            data.config.heart.recentTrigger = '💝 送出了「' + product.name + '」';
        }
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
    } catch (_) {}
}

function triggerGiftChatReplyDirect(role, product, note) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        var fallbacks = ['哇！谢谢你送我的礼物 💕', '你真好，我好喜欢！', '天哪，你居然送我这个！我好感动 😭', '谢谢你的心意，我会好好珍惜的 💝'];
        var reply = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        addReplyToRoleDirect(role.id, reply);
        showToast('💬 ' + role.name + '：' + reply);
        return;
    }

    var model = getModelFromMain();
    var giftMessage = '用户送了你一份礼物：\n商品名：' + product.name + '\n价格：' + product.price + ' 虚拟币\n描述：' + (product.description || '') + '\n' + (note ? '附言：' + note : '') + '\n\n请用你的性格回应这份礼物。';
    var systemPrompt = '你正在扮演「' + role.name + '」。用户刚刚送了你一份礼物，请根据你的性格（人设：' + (role.persona || '温柔体贴') + '）回应这份礼物。要求：用第一人称「我」说话，表达真实感受，控制在2-4句话。';

    fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: giftMessage }],
            temperature: 0.85,
            max_tokens: 200,
        }),
    }).then(function(resp) {
        if (!resp.ok) throw new Error('API 错误');
        return resp.json();
    }).then(function(data) {
        var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        if (reply) {
            addReplyToRoleDirect(role.id, reply);
            showToast('💬 ' + role.name + '：' + reply.substring(0, 40) + (reply.length > 40 ? '...' : ''));
        }
    }).catch(function(e) {
        var fallback2 = ['你收下啦？好开心 💕', '我就知道你会喜欢这个！', '太好了，你愿意收下它 😊'];
        var reply2 = fallback2[Math.floor(Math.random() * fallback2.length)];
        addReplyToRoleDirect(role.id, reply2);
        showToast('💬 ' + role.name + '：' + reply2);
    });
}

function startShoppingTogether(roleId) {
    var role = getRoleById(roleId);
    if (!role) { showToast('⚠️ 未找到该角色'); return; }
    if (shoppingTogether.cooldownUntil && Date.now() < shoppingTogether.cooldownUntil) {
        var remain = Math.ceil((shoppingTogether.cooldownUntil - Date.now()) / 60000);
        showToast('⏳ ' + role.name + ' 还在休息中，' + remain + '分钟后可再次邀请');
        return;
    }

    shoppingTogether.roleId = role.id;
    shoppingTogether.roleName = role.name;
    shoppingTogether.rejectCount = 0;
    shoppingTogether.totalTriggers = 0;
    shoppingTogether.isActive = true;
    shoppingTogether.cooldownUntil = null;
    shoppingTogether.pendingProduct = null;
    saveMallData();

    var inviteBtn = document.getElementById('mallInviteBtn');
    inviteBtn.textContent = '💕 ' + role.name + ' 一起逛';
    inviteBtn.classList.add('inviting');

    showToast('💕 已邀请 ' + role.name + ' 一起逛商城～');
}

function endShoppingTogether() {
    if (!shoppingTogether.isActive) return;
    var roleName = shoppingTogether.roleName || 'TA';
    shoppingTogether.isActive = false;
    shoppingTogether.cooldownUntil = Date.now() + MALL_CONFIG.cooldownMinutes * 60 * 1000;
    shoppingTogether.rejectCount = 0;
    saveMallData();

    document.getElementById('mallInviteBtn').textContent = '💕 心爱的TA';
    document.getElementById('mallInviteBtn').classList.remove('inviting');
    document.getElementById('mallAiSpotOverlay').classList.remove('active');
    showToast('👋 已结束和 ' + roleName + ' 的逛街');
}

function tryTriggerAiSpot(product) {
    if (!shoppingTogether.isActive) return false;
    if (shoppingTogether.rejectCount >= MALL_CONFIG.maxRejectCount) return false;
    if (Math.random() > MALL_CONFIG.spotProbability) return false;

    var role = getRoleById(shoppingTogether.roleId);
    if (!role) return false;

    shoppingTogether.pendingProduct = product;
    showAiSpotDialog(product, role);
    return true;
}

            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
        };
        mallOrders.push(order);
        pendingAiGiftOrder = order;

        // 弹出收货卡片
        showGiftReceiveDialog(order, role);

        shoppingTogether.rejectCount = 0;
        saveMallData();
    };

    document.getElementById('spotRejectBtn').onclick = function() {
        overlay.classList.remove('active');
        shoppingTogether.rejectCount++;
        saveMallData();

        if (shoppingTogether.rejectCount >= MALL_CONFIG.maxRejectCount) {
            var name = shoppingTogether.roleName || 'TA';
            showToast('💔 ' + name + ' 好像有点失落... 结束逛街了');
            var role2 = getRoleById(shoppingTogether.roleId);
            if (role2) {
                var endWords = ['好吧…我知道你是为我好，听你的。', '嗯…没事的，我们随便逛逛吧。', '我懂的，不勉强你。', '好…那就看看吧。'];
                var word = endWords[Math.floor(Math.random() * endWords.length)];
                showToast('💭 ' + role2.name + '：' + word);
            }
            endShoppingTogether();
        } else {
            var remain = MALL_CONFIG.maxRejectCount - shoppingTogether.rejectCount;
            showToast('👀 还剩 ' + remain + ' 次机会哦');
        }
    };
    overlay.classList.add('active');
}

function generateAiSpotWords(role, product) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        var defaults = ['这个好好看！我一眼就喜欢上了 💕', '哇…这个好适合我，你觉得呢？', '我好喜欢这个！能买给我吗？🥺', '这个太合我心意了！', '你看这个，是不是很适合我？'];
        return Promise.resolve(defaults[Math.floor(Math.random() * defaults.length)]);
    }
    var model = getModelFromMain();
    var prompt = '你正在扮演「' + role.name + '」，你在商城看到了一件商品：\n商品名：' + product.name + '\n价格：' + product.price + ' 虚拟币\n描述：' + (product.description || '') + '\n\n请用你的性格（人设：' + (role.persona || '温柔体贴') + '）表达你看到这件商品时的真实感受。要求：用第一人称「我」说话，表达你的喜欢程度，控制在1-2句话，不要说"好喜欢这个"这种通用话术。';
    return fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: '你是一个有丰富情感的角色，请用你的性格说话。' }, { role: 'user', content: prompt }],
            temperature: 0.9,
            max_tokens: 100,
        }),
    }).then(function(resp) {
        if (!resp.ok) throw new Error('API 请求失败');
        return resp.json();
    }).then(function(data) {
        return data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content.trim() : '这个好适合我！你觉得呢？💕';
    }).catch(function(e) {
        return '这个好适合我！你觉得呢？💕';
    });
}

                orderRef.updatedAt = new Date().toISOString();
                saveMallData();
                updateUI();
            }
            var roleRef = getRoleById(pendingAiGiftOrder.roleId);

                triggerHeartSpikeForGift(roleRef, { name: pendingAiGiftOrder.productName }, 'ai_gift');

                    note: pendingAiGiftOrder.note || '一份礼物',
                    targetRoleId: pendingAiGiftOrder.roleId,
                    targetRoleName: pendingAiGiftOrder.roleName,

        overlay.classList.remove('active');

            mallOrders = mallOrders.filter(function(o) { return o.id !== pendingAiGiftOrder.id; });
            saveMallData();
            updateUI();
            showToast('🙅 已拒绝这份礼物');

        }
    };

    overlay.classList.add('active');
}

// ============================================================
//  滚动触发 AI 看中商品
// ============================================================
function initMallScrollTrigger() {
    var body = document.getElementById('mallBody');
    if (!body) return;
    var scrollPending = false;
    body.addEventListener('scroll', function() {
        if (!shoppingTogether.isActive) return;
        if (shoppingTogether.rejectCount >= MALL_CONFIG.maxRejectCount) return;
        if (scrollPending) return;
        scrollPending = true;
        clearTimeout(mallScrollTimeout);
        mallScrollTimeout = setTimeout(function() {
            scrollPending = false;
            var grid = body.querySelector('.mall-product-grid:not([style*="display:none"])');
            if (!grid) return;
            var cards = grid.querySelectorAll('.mall-product-card');
            var targetCard = null;
            var viewportTop = body.scrollTop;
            var viewportBottom = viewportTop + body.clientHeight;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var rect = card.getBoundingClientRect();
                var cardTop = rect.top + body.scrollTop - body.getBoundingClientRect().top;
                var cardBottom = cardTop + rect.height;
                var center = (cardTop + cardBottom) / 2;
                if (center > viewportTop + 100 && center < viewportBottom - 100) {
                    targetCard = card;
                    break;
                }
            }
            if (targetCard) {
                var id = targetCard.dataset.id;
                if (id !== lastTriggeredProductId) {
                    lastTriggeredProductId = id;
                    var currentProducts = mallProducts.concat(mallTakeoutProducts);
                    var product = currentProducts.find(function(p) { return p.id === id; });
                    if (product) tryTriggerAiSpot(product);
                }
            }
        }, 800);
    });
}

// ============================================================
//  购物车
// ============================================================
function addToCart(product, qty) {
    var existing = mallCart.find(function(item) { return item.id === product.id; });
    if (existing) { existing.qty += qty; }
    else { mallCart.push({ id: product.id, name: product.name, price: product.price, image: product.image, qty: qty }); }
    saveMallData();
    updateUI();
    showToast('🛒 已加入购物车：' + product.name + ' ×' + qty);
}

function removeFromCart(productId) {
    mallCart = mallCart.filter(function(item) { return item.id !== productId; });
    saveMallData();
    updateUI();
    renderCart();
}

function updateCartQty(productId, delta) {
    var item = mallCart.find(function(i) { return i.id === productId; });
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(productId); return; }
    saveMallData();
    updateUI();
    renderCart();
}

function renderCart() {
    var list = document.getElementById('cartList');
    var totalEl = document.getElementById('cartTotalPrice');
    var balanceEl = document.getElementById('cartBalanceDisplay');
    var checkoutBtn = document.getElementById('cartCheckoutBtn');
    if (mallCart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>购物车是空的</p></div>';
        totalEl.textContent = '¥0';
        balanceEl.textContent = '¥' + mallBalance;
        checkoutBtn.disabled = true;
        return;
    }
    var html = '', total = 0;
    mallCart.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        var imgHtml = item.image ? '<img src="' + item.image + '" alt="' + item.name + '" />' : '🛍️';
        html += '<div class="cart-item"><div class="ci-img">' + imgHtml + '</div><div class="ci-info"><div class="ci-name">' + item.name + '</div><div class="ci-price">¥' + item.price + '</div></div><div class="ci-qty"><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="-1">−</button><span class="qty-num">' + item.qty + '</span><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="1">+</button></div><button class="ci-remove" data-id="' + item.id + '"><i class="fas fa-trash-alt"></i></button></div>';
    });
    list.innerHTML = html;
    totalEl.textContent = '¥' + total;
    balanceEl.textContent = '¥' + mallBalance;
    if (mallBalance < total) {
        balanceEl.classList.add('insufficient');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '💰 余额不足';
    } else {
        balanceEl.classList.remove('insufficient');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = '🧾 去结算';
    }
    list.querySelectorAll('.ci-qty-btn').forEach(function(btn) {
        btn.onclick = function() { updateCartQty(btn.dataset.id, parseInt(btn.dataset.delta)); };
    });
    list.querySelectorAll('.ci-remove').forEach(function(btn) {
        btn.onclick = function() { removeFromCart(btn.dataset.id); };
    });
    checkoutBtn.onclick = checkoutCart;
}

function checkoutCart() {
    if (mallCart.length === 0) return;
    var total = mallCart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
    if (mallBalance < total) { showToast('💰 余额不足，请充值'); return; }
    if (!confirm('🧾 确认结算购物车？\n共 ' + mallCart.length + ' 件商品\n总计 ¥' + total)) return;
    mallBalance -= total;
    var role = getCurrentRoleFromMain();
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productName: mallCart.map(function(i) { return i.name; }).join('、'),
        price: total,
        qty: mallCart.reduce(function(s, i) { return s + i.qty; }, 0),
        total: total,
        roleName: role ? role.name : 'TA',
        roleId: role ? role.id : null,
        status: 'pending',
        mode: 'buy',
        note: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    mallCart = [];
    saveMallData();
    closeCart();
    updateUI();
    showToast('✅ 下单成功！共 ¥' + total);
}

function openCart() {
    document.getElementById('cartOverlay').classList.add('active');
    renderCart();
}
function closeCart() {
    document.getElementById('cartOverlay').classList.remove('active');
}

// ============================================================
//  UI 更新
// ============================================================
function updateUI() {
    var el = document.getElementById('mallBalanceAmount');
    if (el) el.textContent = mallBalance;
    var cartBalance = document.getElementById('cartBalanceDisplay');
    if (cartBalance) cartBalance.textContent = '¥' + mallBalance;
    var count = mallCart.reduce(function(sum, item) { return sum + item.qty; }, 0);
    var badge = document.getElementById('mallCartCount');
    if (badge) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('empty'); }
        else { badge.classList.add('empty'); }
    }
    saveMallData();
}

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.mall-tab').forEach(function(el) {
        el.classList.toggle('active', el.dataset.tab === tab);
    });
    document.getElementById('tabRecommend').style.display = tab === 'recommend' ? 'block' : 'none';
    document.getElementById('tabTakeout').style.display = tab === 'takeout' ? 'block' : 'none';
    document.getElementById('tabOrders').style.display = tab === 'orders' ? 'flex' : 'none';
    if (tab === 'orders') {
        document.getElementById('tabOrders').style.display = 'flex';
        renderOrders();
    }
}

    loadMallData();
    loadRolesFromMain();
    loadProducts();
    updateUI();

    document.querySelectorAll('.mall-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            switchTab(this.dataset.tab);

    });
    switchTab('recommend');

    document.querySelectorAll('.order-sub-tab').forEach(function(btn) {

            currentOrderSubTab = this.dataset.sub;

    document.getElementById('mallCartBtn').addEventListener('click', openCart);

    document.getElementById('cartOverlay').addEventListener('click', function(e) {

    document.getElementById('mallRoleSelectCancel').addEventListener('click', function() {
