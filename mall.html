    <title>商城 · 我的AI空间</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 430px; height: 780px; background: #1a1a1a; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; transition: background 0.3s ease, color 0.3s ease; }
        :root { --bg-secondary: #faf0fa; --bg-card: rgba(255,255,255,0.85); --text-primary: #2d1a2a; --text-secondary: #b0a0b0; --border-color: rgba(200,180,200,0.2); --shadow-color: rgba(200,150,200,0.08); --header-bg: rgba(255,245,248,0.92); --card-shadow: 0 8px 32px rgba(200,150,200,0.12); }

        .mall-header .mall-balance:active { transform: scale(0.95); }
        .mall-header .mall-balance span { color: #e8b0c0; font-weight: 700; }
        .mall-header .mall-cart-btn { background: none; border: none; font-size: 20px; color: var(--text-primary); cursor: pointer; position: relative; padding: 4px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @media (max-width: 460px) { .phone-frame { border-radius: 0; height: 100vh; max-height: 100vh; } body { padding: 0; } }
    </style>
</head>
<body>
<div class="phone-frame" id="app">
    <!-- ===== 商城主界面 ===== -->
    <div class="screen-mall" id="mallScreen">
        <div class="mall-header">
            <button class="back-btn" id="exitMallBtn" title="退出商城"><i class="fas fa-times"></i></button>
            <div class="title"><i class="fas fa-shopping-bag"></i> 商城</div>
            <div class="mall-actions">
                <span class="mall-balance" id="mallBalanceDisplay">💰 <span id="mallBalanceAmount">1000</span></span>
                <button class="mall-cart-btn" id="mallCartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count empty" id="mallCartCount">0</span>

                <button class="mall-invite-btn" id="mallInviteBtn">💕 心爱的TA</button>

        <div class="mall-body" id="mallBody">
            <!-- 分类 Tabs -->
            <div class="mall-category-tabs" id="categoryTabs">
                <button class="cat-tab active" data-cat="推荐">❤️ 推荐</button>
                <button class="cat-tab" data-cat="外卖">🍽️ 外卖</button>
            </div>
            <div class="mall-product-grid" id="mallProductGrid"></div>
            <div class="mall-order-entry" id="mallOrderEntry">
                <i class="fas fa-box"></i> 我的订单 <span class="order-count" id="orderCountBadge">(0 笔)</span>
                <span style="font-size:12px;color:var(--text-secondary);margin-left:auto;">点击查看 →</span>
            </div>
        </div>
        <!-- 底部导航 -->
        <div class="mall-bottom-nav">
            <button class="nav-item active" data-page="mall"><i class="fas fa-store-alt"></i><span>商城</span></button>
            <button class="nav-item" data-page="cart"><i class="fas fa-shopping-cart"></i><span>购物车</span></button>
            <button class="nav-item" data-page="orders"><i class="fas fa-list-ul"></i><span>订单</span></button>
        </div>
    </div>

    <!-- ===== 商品详情弹窗 ===== -->
    <div class="mall-detail-overlay" id="mallDetailOverlay">
        <div class="mall-detail-header">
            <button class="back-btn" id="mallDetailBack"><i class="fas fa-chevron-left"></i></button>
            <div class="title" id="mallDetailTitle">商品详情</div>
        </div>
        <div class="mall-detail-body" id="mallDetailBody"></div>
        <div class="mall-detail-footer" id="mallDetailFooter">
            <button class="btn-gift" id="mallDetailGiftBtn">💝 送给TA</button>

    <!-- ===== 购物车侧滑 ===== -->

            <div class="cart-list" id="cartList"></div>
            <div class="cart-footer" id="cartFooter">
                <div class="total-row"><span>合计</span><span class="total-price" id="cartTotalPrice">¥0</span></div>
                <div class="balance-row"><span>余额</span><span class="balance-amount" id="cartBalanceDisplay">¥1000</span></div>
                <button class="checkout-btn" id="cartCheckoutBtn">🧾 去结算</button>
            </div>
        </div>
    </div>

    <!-- ===== 充值弹窗 ===== -->
    <div class="mall-recharge-overlay" id="mallRechargeOverlay">
        <div class="mall-recharge-panel">
            <h3>💰 充值虚拟币</h3>
            <p>输入你要充值的金额</p>
            <input class="recharge-input" id="rechargeInput" type="number" placeholder="输入金额" value="100" />
            <div class="recharge-btns">
                <button data-amount="50"><span class="r-amount">50</span> 币</button>
                <button data-amount="100"><span class="r-amount">100</span> 币</button>
                <button data-amount="500"><span class="r-amount">500</span> 币</button>
                <button data-amount="1000"><span class="r-amount">1000</span> 币</button>

            <button class="recharge-confirm" id="rechargeConfirmBtn">✅ 确认充值</button>

    <!-- ===== 选择角色弹窗 ===== -->
    <div class="mall-role-select-overlay" id="mallRoleSelectOverlay">

            <div class="role-select-list" id="mallRoleSelectList"></div>
            <button class="role-select-cancel" id="mallRoleSelectCancel">取消</button>
        </div>
    </div>

    <!-- ===== 送礼成功弹窗 ===== -->
    <div class="gift-success-overlay" id="giftSuccessOverlay">
        <div class="gift-success-panel">
            <div class="gift-icon">🎁</div>
            <h3>💝 礼物已送出！</h3>
            <p>你送给 <span id="giftSuccessRoleName" style="color:#e8b0c0;font-weight:600;">TA</span> 一份</p>
            <div class="gift-product-name" id="giftSuccessProductName">✨ 商品名</div>
            <p style="font-size:13px;color:var(--text-secondary);">返回主应用，在聊天框中查看卡片</p>
            <div class="gift-success-buttons">
                <button class="btn-back-home" id="giftSuccessBackBtn">🏠 返回主应用</button>
                <button class="btn-stay" id="giftSuccessStayBtn">继续逛逛</button>
            </div>
        </div>
    </div>

    <!-- ===== Toast容器 ===== -->
    <div class="custom-toast" id="customToast" style="display:none;"></div>
</div> <script>
// ============================================================
//  全局配置
// ============================================================
var MALL_CONFIG = {
    initialBalance: 1000,
    heartSpikeOnGift: 15,
};

// ============================================================
//  全局变量
// ============================================================
var mallProducts = [];
var mallCart = [];
var mallOrders = [];
var mallBalance = MALL_CONFIG.initialBalance;
var mallRoles = [];
var currentDetailProduct = null;
var selectedCategory = '推荐';
var pendingGiftData = null;

// ============================================================
//  工具函数
// ============================================================
function generateId() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
}

function showToast(msg) {
    var toast = document.getElementById('customToast');
    if (!toast) return;
    toast.textContent = msg;
    toast.style.display = 'block';
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.style.display = 'none'; }, 300);
    }, 2500);
}

// ============================================================
//  数据读写
// ============================================================
function loadMallData() {
    try {
        var raw = localStorage.getItem('mall_data');
        if (raw) {
            var data = JSON.parse(raw);
            mallBalance = data.balance !== undefined ? data.balance : MALL_CONFIG.initialBalance;
            mallCart = data.cart || [];
            mallOrders = data.orders || [];
        }
    } catch (_) {}
}

function saveMallData() {
    try {
        localStorage.setItem('mall_data', JSON.stringify({
            balance: mallBalance,
            cart: mallCart,
            orders: mallOrders,
        }));
    } catch (_) {}
}

function loadRolesFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            mallRoles = data.roles || [];
            return mallRoles;
        }
    } catch (_) {}
    return [];
}

function getApiKeyFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            return data.config && data.config.apiKey ? data.config.apiKey : '';
        }
    } catch (_) {}
    return '';
}

function getModelFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            return data.config && data.config.model ? data.config.model : 'deepseek-chat';
        }
    } catch (_) {}
    return 'deepseek-chat';
}

function getCurrentRoleFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            var currentId = data.currentRoleId;
            if (currentId) {
                return data.roles.find(function(r) { return r.id === currentId; }) || data.roles[0] || null;
            }
            return data.roles[0] || null;
        }
    } catch (_) {}
    return null;
}

// ============================================================
//  💝 写入待处理礼物数据
// ============================================================
function savePendingGift(giftData) {
    try {
        localStorage.setItem('pending_gift', JSON.stringify(giftData));
        return true;
    } catch (_) { return false; }
}

// ============================================================
//  加载商品
// ============================================================
function loadMallProducts() {
    var grid = document.getElementById('mallProductGrid');
    if (!grid) return;

    fetch('./products.json').then(function(resp) {
        if (!resp.ok) throw new Error('加载失败');
        return resp.json();
    }).then(function(data) {
        mallProducts = data.products || [];
        renderMallProducts();
        updateMallUI();
    }).catch(function(e) {
        console.warn('加载 products.json 失败，使用备用数据:', e);
        mallProducts = [
            { id: 'default_1', name: '纯白衬衫', price: 129, image: '', description: '新疆纯棉制造，柔软舒适', tag: '新品', category: '推荐' },
            { id: 'default_2', name: '真丝睡裙', price: 169, image: '', description: '真蚕丝，柔软舒适，安稳睡眠', tag: '热销', category: '推荐' },
            { id: 'default_3', name: '情侣手链', price: 89, image: '', description: '925银镀金，刻字定制', tag: '情侣', category: '推荐' },
        ];
        renderMallProducts();
        updateMallUI();
        showToast('📦 已加载备用商品数据');
    });
}

function renderMallProducts() {
    var grid = document.getElementById('mallProductGrid');
    if (!grid) return;

    var filtered = mallProducts.filter(function(p) {
        return (p.category || '推荐') === selectedCategory;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="mall-empty"><i class="fas fa-box-open"></i><p>暂无商品<br />试试切换分类吧 🛍️</p></div>';
        return;
    }

    var html = '';
    filtered.forEach(function(p) {
        var tagHtml = p.tag ? '<span class="product-tag ' + getTagClass(p.tag) + '">' + p.tag + '</span>' : '';
        var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.textContent=\'🛍️\';" />' : '🛍️';
        html += '<div class="mall-product-card" data-id="' + p.id + '">' + tagHtml + '<div class="product-img">' + imgHtml + '</div><div class="product-name">' + p.name + '</div><div class="product-price">¥' + p.price + '</div></div>';
    });
    grid.innerHTML = html;

    grid.querySelectorAll('.mall-product-card').forEach(function(el) {
        el.addEventListener('click', function() {
            var product = mallProducts.find(function(p) { return p.id === el.dataset.id; });
            if (product) openMallDetail(product);
        });
    });

    updateOrderCount();
}

function getTagClass(tag) {
    var map = { '热销': 'hot', '新品': 'new', '情侣': 'couple' };
    return map[tag] || 'default-tag';
}

function updateOrderCount() {
    var badge = document.getElementById('orderCountBadge');
    if (badge) badge.textContent = '(' + mallOrders.length + ' 笔)';
}

// ============================================================
//  商品详情
// ============================================================
function openMallDetail(product) {
    currentDetailProduct = product;
    var overlay = document.getElementById('mallDetailOverlay');
    var body = document.getElementById('mallDetailBody');
    document.getElementById('mallDetailTitle').textContent = product.name;

    var imgHtml = product.image ? '<img src="' + product.image + '" alt="' + product.name + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'🛍️\';" />' : '🛍️';
    body.innerHTML = '<div class="detail-img">' + imgHtml + '</div><div class="detail-name">' + product.name + '</div><div class="detail-price">¥' + product.price + '</div><div class="detail-desc">' + (product.description || '暂无描述') + '</div><div class="detail-qty"><label>数量</label><button class="qty-btn" id="detailQtyMinus">−</button><span class="qty-num" id="detailQtyNum">1</span><button class="qty-btn" id="detailQtyPlus">+</button></div><div class="detail-note"><input type="text" id="detailNoteInput" placeholder="给TA的留言（选填）..." /></div>';
    overlay.classList.add('active');

    var qty = 1;
    var qtyNum = document.getElementById('detailQtyNum');
    document.getElementById('detailQtyMinus').onclick = function() { if (qty > 1) { qty--; qtyNum.textContent = qty; } };
    document.getElementById('detailQtyPlus').onclick = function() { qty++; qtyNum.textContent = qty; };

    var currentRole = getCurrentRoleFromMain();
    var roleName = currentRole ? currentRole.name : 'TA';
    document.getElementById('mallDetailGiftBtn').textContent = '💝 送给' + roleName;
    document.getElementById('mallDetailBuyBtn').textContent = '💰 购买';

    document.getElementById('mallDetailGiftBtn').onclick = function() {
        var note = document.getElementById('detailNoteInput').value.trim();
        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'gift');
    };
    document.getElementById('mallDetailBuyBtn').onclick = function() {
        var note = document.getElementById('detailNoteInput').value.trim();
        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'buy');
    };
}

function closeMallDetail() {
    document.getElementById('mallDetailOverlay').classList.remove('active');
}

// ============================================================
//  选择角色弹窗
// ============================================================
function selectTargetRoleSync() {
    return new Promise(function(resolve) {
        var roles = loadRolesFromMain();
        if (roles.length === 0) {
            showToast('⚠️ 暂无角色，请先在主应用创建');
            resolve(null);
            return;
        }

        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');
        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:#e8b0c0;';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');

        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                var role = roles.find(function(r) { return r.id === btn.dataset.id; });
                resolve(role);
            };
        });
        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
            resolve(null);
        };
    });
}

// ============================================================
//  购买 / 送礼（核心修复）
// ============================================================
function purchaseProduct(product, qty, note, mode) {
    var totalPrice = product.price * qty;
    var currentRole = getCurrentRoleFromMain();

    if (mode === 'gift') {
        selectTargetRoleSync().then(function(selected) {
            if (!selected) return;
            executeGift(product, qty, note, selected);
        });
        return;
    }

    if (!currentRole) {
        showToast('⚠️ 请先在主应用中创建角色');
        return;
    }
    executePurchase(product, qty, note, currentRole, totalPrice);
}

// 普通购买
function executePurchase(product, qty, note, targetRole, totalPrice) {
    if (mallBalance < totalPrice) { showToast('💰 余额不足，去充值吧～'); return; }
    if (!confirm('💰 确定购买「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice)) return;

    mallBalance -= totalPrice;
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id,
        productName: product.name,
        productImage: product.image,
        price: product.price,
        qty: qty,
        total: totalPrice,
        note: note || '',
        mode: 'buy',
        roleName: targetRole.name,
        roleId: targetRole.id,
        status: 'pending',
        giftFromAi: false,
        createdAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    saveMallData();
    closeMallDetail();
    updateMallUI();
    showToast('✅ 购买成功！');
}

// 🎁 送礼（核心修复）
function executeGift(product, qty, note, targetRole) {
    var totalPrice = product.price * qty;
    if (mallBalance < totalPrice) { showToast('💰 余额不足，去充值吧～'); return; }

    var confirmMsg = '💝 确定送给 ' + targetRole.name + '「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice;
    if (!confirm(confirmMsg)) return;

    // 扣余额
    mallBalance -= totalPrice;

    // 生成订单
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id,
        productName: product.name,
        productImage: product.image,
        price: product.price,
        qty: qty,
        total: totalPrice,
        note: note || '',
        mode: 'gift',
        roleName: targetRole.name,
        roleId: targetRole.id,
        status: 'pending',
        giftFromAi: false,
        createdAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    saveMallData();
    closeMallDetail();
    updateMallUI();

    // 生成 AI 附言（符合人设）
    generateAiGiftNote(targetRole, product, note).then(function(aiNote) {
        // 写入 pending_gift
        var giftData = {
            id: 'gift_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            productName: product.name,
            productImage: product.image || '',
            price: product.price,
            userNote: note || '',
            aiNote: aiNote || '希望你喜欢这份礼物 💕',
            roleId: targetRole.id,
            roleName: targetRole.name,
            sender: 'user',
            status: 'pending',
            createdAt: new Date().toISOString(),
        };
        savePendingGift(giftData);

        // 显示送礼成功弹窗
        showGiftSuccess(targetRole, product);
    }).catch(function() {
        // 如果 AI 生成失败，使用默认附言
        var giftData = {
            id: 'gift_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
            productName: product.name,
            productImage: product.image || '',
            price: product.price,
            userNote: note || '',
            aiNote: '希望你喜欢这份礼物 💕',
            roleId: targetRole.id,
            roleName: targetRole.name,
            sender: 'user',
            status: 'pending',
            createdAt: new Date().toISOString(),
        };
        savePendingGift(giftData);
        showGiftSuccess(targetRole, product);
    });
}

// 生成 AI 附言
function generateAiGiftNote(role, product, userNote) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        var defaults = [
            '这份礼物送给你，希望你喜欢 💕',
            '看到这个就想到你，所以就买了～',
            '你一定会喜欢的，我保证！😊',
            '这是我精心挑选的，希望你会开心 💝'
        ];
        return Promise.resolve(defaults[Math.floor(Math.random() * defaults.length)]);
    }

    var model = getModelFromMain();
    var prompt = '你正在扮演「' + role.name + '」。用户送了你一份礼物：' + product.name + (userNote ? '，附言：' + userNote : '') + '。\n【你的性格】' + (role.persona || '温柔体贴') + '\n【说话风格】' + (role.style || '自然简短') + '\n\n请用你的性格说一句收到礼物时的感受，表达你的喜欢或感谢。控制在1-2句话，用第一人称「我」说话，不要用预设模板。';

    return fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: '你是一个有丰富情感的角色，请用你的性格说话。' }, { role: 'user', content: prompt }],
            temperature: 0.9,
            max_tokens: 80,
        }),
    }).then(function(resp) {
        if (!resp.ok) throw new Error('API 错误');
        return resp.json();
    }).then(function(data) {
        var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        return reply ? reply.trim() : '谢谢你的礼物，我好喜欢 💕';
    }).catch(function() {
        return '谢谢你的礼物，我好喜欢 💕';
    });
}

// 显示送礼成功弹窗
function showGiftSuccess(role, product) {
    var overlay = document.getElementById('giftSuccessOverlay');
    document.getElementById('giftSuccessRoleName').textContent = role.name;
    document.getElementById('giftSuccessProductName').textContent = '✨ ' + product.name;
    overlay.classList.add('active');

    // 返回主应用
    document.getElementById('giftSuccessBackBtn').onclick = function() {
        overlay.classList.remove('active');
        window.location.href = 'index.html';
    };

    // 继续逛逛
    document.getElementById('giftSuccessStayBtn').onclick = function() {
        overlay.classList.remove('active');
        showToast('💝 礼物已送出！记得回主应用查看');
    };
}

// ============================================================
//  购物车
// ============================================================
function addToCart(product, qty) {
    var existing = mallCart.find(function(item) { return item.id === product.id; });
    if (existing) { existing.qty += qty; }
    else { mallCart.push({ id: product.id, name: product.name, price: product.price, image: product.image, qty: qty }); }
    saveMallData();
    updateMallUI();
    showToast('🛒 已加入购物车：' + product.name + ' ×' + qty);
}

function removeFromCart(productId) {
    mallCart = mallCart.filter(function(item) { return item.id !== productId; });
    saveMallData();
    updateMallUI();
    renderCart();
}

function updateCartQty(productId, delta) {
    var item = mallCart.find(function(i) { return i.id === productId; });
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(productId); return; }
    saveMallData();
    updateMallUI();
    renderCart();
}

function renderCart() {
    var list = document.getElementById('cartList');
    var totalEl = document.getElementById('cartTotalPrice');
    var balanceEl = document.getElementById('cartBalanceDisplay');
    var checkoutBtn = document.getElementById('cartCheckoutBtn');

    if (mallCart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>购物车是空的</p></div>';
        totalEl.textContent = '¥0';
        balanceEl.textContent = '¥' + mallBalance;
        checkoutBtn.disabled = true;
        return;
    }

    var html = '', total = 0;
    mallCart.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        var imgHtml = item.image ? '<img src="' + item.image + '" alt="' + item.name + '" onerror="this.style.display=\'none\';" />' : '🛍️';
        html += '<div class="cart-item"><div class="ci-img">' + imgHtml + '</div><div class="ci-info"><div class="ci-name">' + item.name + '</div><div class="ci-price">¥' + item.price + '</div></div><div class="ci-qty"><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="-1">−</button><span class="qty-num">' + item.qty + '</span><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="1">+</button></div><button class="ci-remove" data-id="' + item.id + '"><i class="fas fa-trash-alt"></i></button></div>';
    });
    list.innerHTML = html;
    totalEl.textContent = '¥' + total;
    balanceEl.textContent = '¥' + mallBalance;

    if (mallBalance < total) {
        balanceEl.classList.add('insufficient');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '💰 余额不足';
    } else {
        balanceEl.classList.remove('insufficient');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = '🧾 去结算';
    }

    list.querySelectorAll('.ci-qty-btn').forEach(function(btn) {
        btn.onclick = function() { updateCartQty(btn.dataset.id, parseInt(btn.dataset.delta)); };
    });
    list.querySelectorAll('.ci-remove').forEach(function(btn) {
        btn.onclick = function() { removeFromCart(btn.dataset.id); };
    });
    checkoutBtn.onclick = checkoutCart;
}

function checkoutCart() {
    if (mallCart.length === 0) return;
    var total = mallCart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
    if (mallBalance < total) { showToast('💰 余额不足，请充值'); return; }
    if (!confirm('🧾 确认结算购物车？\n共 ' + mallCart.length + ' 件商品\n总计 ¥' + total)) return;

    mallBalance -= total;
    var role = getCurrentRoleFromMain();
    var roleName = role ? role.name : 'TA';
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        items: mallCart.map(function(item) { return { productId: item.id, productName: item.name, productImage: item.image, price: item.price, qty: item.qty }; }),
        total: total,
        roleName: roleName,
        roleId: role ? role.id : null,
        status: 'pending',
        createdAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    mallCart = [];
    saveMallData();
    closeCart();
    updateMallUI();
    showToast('✅ 下单成功！共 ¥' + total);
}

function openCart() {
    document.getElementById('cartOverlay').classList.add('active');
    renderCart();
}

function closeCart() {
    document.getElementById('cartOverlay').classList.remove('active');
}

// ============================================================
//  UI 更新
// ============================================================
function updateMallUI() {
    var el = document.getElementById('mallBalanceAmount');
    if (el) el.textContent = mallBalance;
    var cartBalance = document.getElementById('cartBalanceDisplay');
    if (cartBalance) cartBalance.textContent = '¥' + mallBalance;

    var count = mallCart.reduce(function(sum, item) { return sum + item.qty; }, 0);
    var badge = document.getElementById('mallCartCount');
    if (badge) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('empty'); }
        else { badge.classList.add('empty'); }
    }
    updateOrderCount();
    saveMallData();
}

// ============================================================
//  订单列表
// ============================================================
function showOrderList() {
    var body = document.getElementById('mallBody');
    if (!body) return;
    var html = '<div style="margin-bottom:12px;"><button class="meme-back-btn" onclick="backToMallHome()" style="background:none;border:none;color:#b888b8;font-size:14px;cursor:pointer;padding:4px 8px;display:flex;align-items:center;gap:4px;"><i class="fas fa-arrow-left"></i> 返回商城</button></div>';
    html += '<div class="mall-order-list">';

    if (mallOrders.length === 0) {
        html += '<div class="mall-empty"><i class="fas fa-inbox"></i><p>暂无订单</p></div>';
    } else {
        var sortedOrders = mallOrders.slice().sort(function(a, b) {
            return new Date(b.createdAt) - new Date(a.createdAt);
        });
        sortedOrders.forEach(function(order) {
            var statusMap = { 'pending': '待发货', 'shipped': '已发货', 'done': '已完成' };
            var statusClass = { 'pending': 'status-pending', 'shipped': 'status-shipped', 'done': 'status-done' };
            var itemsText = order.items ? order.items.map(function(item) {
                return item.productName + ' ×' + item.qty;
            }).join('、') : order.productName + ' ×' + order.qty;
            var modeTag = order.mode === 'gift' ? ' 💝 送礼' : ' 🛒 购买';
            html += '<div class="mall-order-item"><div class="order-header"><span class="order-id">' + order.id + '</span><span class="order-time">' + new Date(order.createdAt).toLocaleString() + '</span></div><div class="order-items">' + itemsText + modeTag + '</div><div class="order-total">¥' + order.total + '</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;"><span class="order-status ' + (statusClass[order.status] || 'status-pending') + '">' + (statusMap[order.status] || '待发货') + '</span><div class="order-actions">' + (order.status === 'pending' ? '<button class="btn-ship" data-id="' + order.id + '">🚚 发货</button>' : '') + (order.status === 'shipped' ? '<button class="btn-done" data-id="' + order.id + '">✅ 确认收货</button>' : '') + '<button class="btn-delete-order" data-id="' + order.id + '">🗑️ 删除</button></div></div></div>';
        });
    }

    html += '</div>';
    body.innerHTML = html;

    body.querySelectorAll('.btn-ship').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallOrders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'shipped'; saveMallData(); showOrderList(); showToast('🚚 已发货'); }
        };
    });
    body.querySelectorAll('.btn-done').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallOrders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'done'; saveMallData(); showOrderList(); showToast('✅ 已确认收货'); }
        };
    });
    body.querySelectorAll('.btn-delete-order').forEach(function(btn) {
        btn.onclick = function() {
            if (confirm('确定要删除此订单吗？')) {
                mallOrders = mallOrders.filter(function(o) { return o.id !== btn.dataset.id; });
                saveMallData();
                showOrderList();
                showToast('🗑️ 已删除订单');
            }
        };
    });
}

    renderMallProducts();
    updateOrderCount();

//  底部导航切换
// ============================================================
function switchTab(tab) {
    var navItems = document.querySelectorAll('.mall-bottom-nav .nav-item');
    navItems.forEach(function(item) {
        item.classList.toggle('active', item.dataset.page === tab);
    });

    if (tab === 'mall') {
        renderMallProducts();
        updateOrderCount();
        var entry = document.getElementById('mallOrderEntry');
        if (entry) entry.style.display = 'flex';
    } else if (tab === 'cart') {
        openCart();
        // 恢复商城 tab 高亮（购物车是弹窗）
        navItems.forEach(function(item) {
            item.classList.toggle('active', item.dataset.page === 'mall');
        });
    } else if (tab === 'orders') {
        showOrderList();
    }
}

function openRoleSelectDialog() {
    var roles = loadRolesFromMain();
    var overlay = document.getElementById('mallRoleSelectOverlay');
    var list = document.getElementById('mallRoleSelectList');
    if (roles.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:14px;">暂无角色，先去主应用创建吧</p>';
        overlay.classList.add('active');
        return;
    }

    var html = '';
    roles.forEach(function(role) {
        var avatarStyle = role.avatar ? 'background-image:url(' + role.avatar + ');background-size:cover;background-position:center;' : 'background-color:#e8b0c0;';
        html += '<button class="role-select-btn" data-id="' + role.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + role.name + ' 💕</span></button>';
    });
    list.innerHTML = html;
    overlay.classList.add('active');

    list.querySelectorAll('.role-select-btn').forEach(function(btn) {
        btn.onclick = function() {
            overlay.classList.remove('active');
            var role = roles.find(function(r) { return r.id === btn.dataset.id; });
            if (role) {
                showToast('💕 已邀请 ' + role.name + ' 一起逛～');
                var inviteBtn = document.getElementById('mallInviteBtn');
                inviteBtn.textContent = '💕 ' + role.name + ' 一起逛';
                inviteBtn.classList.add('inviting');
            }
        };
    });
    document.getElementById('mallRoleSelectCancel').onclick = function() {
        overlay.classList.remove('active');
    };
}

function endShoppingTogether() {
    var inviteBtn = document.getElementById('mallInviteBtn');
    inviteBtn.textContent = '💕 心爱的TA';
    inviteBtn.classList.remove('inviting');
    showToast('👋 已结束逛街');
}

// ============================================================
//  退出商城
// ============================================================
function exitMall() {
    // 检查是否有待处理的礼物
    try {
        var raw = localStorage.getItem('pending_gift');
        if (raw) {
            var data = JSON.parse(raw);
            if (data && data.status === 'pending') {
                if (confirm('💝 你有一份礼物尚未查看！确定要退出吗？')) {
                    window.location.href = 'index.html';
                }
                return;
            }
        }
    } catch (_) {}
    window.location.href = 'index.html';
}

// ============================================================
//  初始化
// ============================================================
function init() {
    loadMallData();
    loadRolesFromMain();
    loadMallProducts();
    updateMallUI();

    // 检查是否有待处理的礼物（在商城页面提醒）
    try {
        var raw = localStorage.getItem('pending_gift');
        if (raw) {
            var data = JSON.parse(raw);
            if (data && data.status === 'pending') {
                setTimeout(function() {
                    showToast('💝 你有一份待查看的礼物！返回主应用查看');
                }, 1000);
            }
        }
    } catch (_) {}

    console.log('🛍️ 商城已启动！');
    console.log('商品数量:', mallProducts.length);
    console.log('订单数量:', mallOrders.length);
    console.log('余额:', mallBalance);
}

    // 分类切换
    document.querySelectorAll('.cat-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
            selectedCategory = this.dataset.cat;
            renderMallProducts();
        });
    });

    // 底部导航
    document.querySelectorAll('.mall-bottom-nav .nav-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var page = this.dataset.page;
            if (page === 'mall') {
                switchTab('mall');
            } else if (page === 'cart') {
                switchTab('cart');
            } else if (page === 'orders') {
                switchTab('orders');
            }
        });
    });

    // 退出商城
    document.getElementById('exitMallBtn').addEventListener('click', exitMall);

    // 购物车
    document.getElementById('mallCartBtn').addEventListener('click', openCart);
    document.getElementById('cartCloseBtn').addEventListener('click', closeCart);
    document.getElementById('cartOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeCart();
    });

    // 余额充值
    document.getElementById('mallBalanceDisplay').addEventListener('click', openRecharge);
    document.getElementById('rechargeConfirmBtn').addEventListener('click', function() {
        var amount = parseInt(document.getElementById('rechargeInput').value);
        if (!amount || amount <= 0) { showToast('⚠️ 请输入有效金额'); return; }
        mallBalance += amount;
        saveMallData();
        closeRecharge();
        updateMallUI();
        showToast('💰 充值成功！+¥' + amount);
    });
    document.getElementById('rechargeCancelBtn').addEventListener('click', closeRecharge);
    document.querySelectorAll('.recharge-btns button').forEach(function(btn) {
        btn.onclick = function() { document.getElementById('rechargeInput').value = btn.dataset.amount; };
    });

    // AI 一起逛
    document.getElementById('mallInviteBtn').addEventListener('click', openRoleSelectDialog);
    document.getElementById('mallRoleSelectCancel').addEventListener('click', function() {
        document.getElementById('mallRoleSelectOverlay').classList.remove('active');
    });
    // 点击邀请按钮时如果是已邀请状态，点击可结束
    document.getElementById('mallInviteBtn').addEventListener('click', function() {
        if (this.classList.contains('inviting')) {
            endShoppingTogether();
        }
    });

    // 商品详情返回
    document.getElementById('mallDetailBack').addEventListener('click', closeMallDetail);

    // 我的订单入口
    document.getElementById('mallOrderEntry').addEventListener('click', function() {
        switchTab('orders');
        document.querySelectorAll('.mall-bottom-nav .nav-item').forEach(function(item) {
            item.classList.toggle('active', item.dataset.page === 'orders');
        });
    });

    // 启动
    init();
});
