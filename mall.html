<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>造梦 · 商城</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 430px; height: 780px; background: #faf0f0; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        :root { --bg-primary: #faf0f0; --bg-secondary: #fff5f5; --bg-card: #ffffff; --text-primary: #3a2a2a; --text-secondary: #a08080; --border-color: rgba(255,107,129,0.12); --shadow-color: rgba(255,107,129,0.08); --header-bg: rgba(255,248,248,0.95); --pink-primary: #ff6b81; --pink-light: #fce4ec; --pink-gradient: linear-gradient(135deg, #ff6b81, #ee5a24); }
        .screen-mall { width: 100%; height: 100%; background: var(--bg-primary); display: flex; flex-direction: column; }
        /* 头部 */
        .mall-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 10px 14px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; min-height: 50px; }
        .mall-header .back-btn { font-size: 20px; color: #576b95; cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 6px; }
        .mall-header .title i { color: #ff6b81; }
        .mall-header .mall-actions { display: flex; align-items: center; gap: 6px; }
        .mall-header .mall-balance { font-size: 12px; color: var(--text-secondary); background: rgba(255,107,129,0.1); padding: 3px 10px; border-radius: 14px; border: 1px solid rgba(255,107,129,0.15); cursor: pointer; transition: 0.15s; font-weight: 500; }
        .mall-header .mall-balance:active { transform: scale(0.95); }
        .mall-header .mall-balance span { color: #ff6b81; font-weight: 700; }
        .mall-header .mall-cart-btn { background: none; border: none; font-size: 18px; color: var(--text-primary); cursor: pointer; position: relative; padding: 4px; }
        .mall-header .mall-cart-btn .cart-count { position: absolute; top: -4px; right: -4px; background: #ff6b81; color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .mall-header .mall-cart-btn .cart-count.empty { display: none; }
        .mall-header .mall-invite-btn { background: var(--pink-gradient); border: none; color: #fff; padding: 4px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; white-space: nowrap; box-shadow: 0 2px 8px rgba(255,107,129,0.25); }
        .mall-header .mall-invite-btn:active { transform: scale(0.95); }
        .mall-header .mall-invite-btn.inviting { background: #a29bfe; }
        /* Tab */
        .mall-tabs { background: var(--header-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); display: flex; flex-shrink: 0; }
        .mall-tab { flex: 1; text-align: center; padding: 10px 0 8px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.15s; }
        .mall-tab.active { color: #ff6b81; border-bottom-color: #ff6b81; }
        .mall-tab:active { opacity: 0.6; }
        /* 身体 */
        .mall-body { flex: 1; overflow-y: auto; padding: 10px 12px 16px; position: relative; background: var(--bg-primary); }
        .mall-body::-webkit-scrollbar { width: 3px; }
        .mall-body::-webkit-scrollbar-thumb { background: rgba(255,107,129,0.3); border-radius: 4px; }
        /* 商品网格 */
        .mall-product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .mall-product-card { background: var(--bg-card); border-radius: 14px; padding: 8px 8px 10px; box-shadow: 0 2px 10px var(--shadow-color); transition: 0.15s; display: flex; flex-direction: column; cursor: pointer; position: relative; border: 1px solid rgba(255,107,129,0.04); }
        .mall-product-card:active { transform: scale(0.97); }
        .mall-product-card .product-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 28px; margin-bottom: 4px; border: 1px solid var(--border-color); overflow: hidden; }
        .mall-product-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-product-card .product-name { font-size: 12px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-product-card .product-price { font-size: 14px; font-weight: 700; color: #ff6b81; margin-top: 1px; }
        .mall-product-card .product-tag { position: absolute; top: 6px; left: 6px; font-size: 9px; background: rgba(255,107,129,0.85); color: #fff; padding: 1px 8px; border-radius: 8px; font-weight: 500; }
        .mall-product-card .product-tag.hot { background: #ff6b81; }
        .mall-product-card .product-tag.new { background: #74b9ff; }
        .mall-product-card .product-tag.couple { background: #a29bfe; }
        .mall-product-card .product-tag.default-tag { background: #b2bec3; }
        .mall-empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); grid-column: 1 / -1; }
        .mall-empty i { font-size: 40px; opacity: 0.3; display: block; margin-bottom: 10px; }
        /* 分类筛选 */
        .mall-category-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; padding: 4px 0; }
        .mall-category-filter .cat-btn { padding: 4px 14px; border-radius: 14px; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 12px; color: var(--text-secondary); cursor: pointer; transition: 0.15s; font-family: inherit; }
        .mall-category-filter .cat-btn:active { transform: scale(0.95); }
        .mall-category-filter .cat-btn.active { background: #ff6b81; color: #fff; border-color: #ff6b81; }
        /* 订单中心 */
        .mall-order-section { display: none; flex-direction: column; height: 100%; }
        .mall-order-section.active { display: flex; }
        .mall-order-header { display: flex; align-items: center; gap: 10px; padding: 4px 0 10px; border-bottom: 1px solid var(--border-color); margin-bottom: 10px; flex-shrink: 0; flex-wrap: wrap; }
        .mall-order-header .order-role-selector { padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 13px; color: var(--text-primary); outline: none; font-family: inherit; max-width: 100px; }
        .mall-order-header .order-role-selector:focus { border-color: #ff6b81; }
        .mall-order-header .order-sub-tabs { display: flex; gap: 4px; margin-left: auto; }
        .mall-order-header .order-sub-tab { padding: 4px 14px; border-radius: 14px; font-size: 12px; color: var(--text-secondary); cursor: pointer; border: 1px solid transparent; transition: 0.15s; background: none; font-family: inherit; }
        .mall-order-header .order-sub-tab.active { background: #ff6b81; color: #fff; border-color: #ff6b81; }
        .mall-order-header .order-sub-tab:active { transform: scale(0.95); }
        .mall-order-list { flex: 1; overflow-y: auto; padding-bottom: 10px; }
        .mall-order-item { background: var(--bg-card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 6px var(--shadow-color); border-left: 4px solid #ff6b81; }
        .mall-order-item .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
        .mall-order-item .order-id { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-time { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-status { font-size: 11px; font-weight: 600; padding: 1px 10px; border-radius: 10px; }
        .mall-order-item .order-status.status-pending { background: #fdcb6e; color: #5a3d1a; }
        .mall-order-item .order-status.status-done { background: #ff6b81; color: #fff; }
        .mall-order-item .order-items { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
        .mall-order-item .order-items .oi-gift-tag { color: #a29bfe; font-weight: 500; margin-left: 4px; }
        .mall-order-item .order-total { font-size: 14px; font-weight: 600; color: #ff6b81; text-align: right; margin-top: 2px; }
        .mall-order-item .order-direction { font-size: 11px; color: var(--text-secondary); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
        .mall-order-item .order-direction .dir-icon { color: #ff6b81; }
        /* 弹窗 */
        .mall-detail-overlay { position: absolute; inset: 0; z-index: 30; background: var(--bg-primary); display: none; flex-direction: column; animation: fadeInUp 0.25s ease; border-radius: 32px; overflow: hidden; }
        .mall-detail-overlay.active { display: flex; }
        .mall-detail-header { background: var(--header-bg); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-height: 48px; }
        .mall-detail-header .back-btn { font-size: 20px; color: #576b95; cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-detail-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .mall-detail-body .detail-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 12px; }
        .mall-detail-body .detail-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-detail-body .detail-name { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .mall-detail-body .detail-price { font-size: 22px; font-weight: 700; color: #ff6b81; margin: 4px 0 8px; }
        .mall-detail-body .detail-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; padding: 10px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); }
        .mall-detail-body .detail-qty { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .mall-detail-body .detail-qty label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .mall-detail-body .detail-qty .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .mall-detail-body .detail-qty .qty-btn:active { transform: scale(0.92); }
        .mall-detail-body .detail-qty .qty-num { font-size: 16px; font-weight: 600; color: var(--text-primary); min-width: 28px; text-align: center; }
        .mall-detail-body .detail-note input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); outline: none; font-family: inherit; }
        .mall-detail-body .detail-note input:focus { border-color: #ff6b81; }
        .mall-detail-footer { display: flex; gap: 10px; padding: 12px 16px; background: var(--header-bg); border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .mall-detail-footer button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .mall-detail-footer button:active { transform: scale(0.97); }
        .mall-detail-footer .btn-gift { background: var(--pink-gradient); color: #fff; box-shadow: 0 2px 8px rgba(255,107,129,0.3); }
        .mall-detail-footer .btn-gift:disabled { opacity: 0.4; cursor: not-allowed; }
        .mall-detail-footer .btn-buy { background: #a29bfe; color: #fff; box-shadow: 0 2px 8px rgba(162,155,254,0.3); }
        .mall-detail-footer .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }
        /* 购物车侧滑 */
        .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(3px); z-index: 40; display: none; justify-content: flex-end; border-radius: 0; overflow: hidden; }
        .cart-overlay.active { display: flex; }
        .cart-drawer { background: var(--bg-card); width: 88%; max-width: 340px; height: 100%; padding: 20px 18px 30px; overflow-y: auto; box-shadow: -4px 0 25px rgba(0,0,0,0.1); animation: slideInRight 0.25s ease; display: flex; flex-direction: column; }
        .cart-drawer .cart-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .cart-drawer .cart-header h3 { font-size: 17px; color: var(--text-primary); }
        .cart-drawer .cart-header .close-cart { font-size: 22px; color: var(--text-secondary); cursor: pointer; background: none; border: none; }
        .cart-drawer .cart-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .cart-drawer .cart-empty { text-align: center; padding: 30px 0; color: var(--text-secondary); }
        .cart-drawer .cart-empty i { font-size: 36px; opacity: 0.3; display: block; margin-bottom: 8px; }
        .cart-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item .ci-img { width: 40px; height: 40px; border-radius: 8px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
        .cart-item .ci-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item .ci-info { flex: 1; }
        .cart-item .ci-info .ci-name { font-size: 13px; color: var(--text-primary); }
        .cart-item .ci-info .ci-price { font-size: 12px; color: #ff6b81; font-weight: 600; }
        .cart-item .ci-qty { display: flex; align-items: center; gap: 4px; }
        .cart-item .ci-qty button { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .cart-item .ci-qty button:active { transform: scale(0.92); }
        .cart-item .ci-qty .qty-num { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 22px; text-align: center; }
        .cart-item .ci-remove { color: #e74c3c; cursor: pointer; font-size: 14px; background: none; border: none; padding: 4px; }
        .cart-footer { border-top: 1px solid var(--border-color); padding-top: 12px; flex-shrink: 0; }
        .cart-footer .total-row { display: flex; justify-content: space-between; font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .cart-footer .total-row .total-price { color: #ff6b81; }
        .cart-footer .balance-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .cart-footer .balance-row .balance-amount { color: #ff6b81; font-weight: 600; }
        .cart-footer .balance-row .balance-amount.insufficient { color: #e74c3c; }
        .cart-footer .checkout-btn { width: 100%; padding: 10px; border: none; border-radius: 12px; background: var(--pink-gradient); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; box-shadow: 0 2px 8px rgba(255,107,129,0.3); }
        .cart-footer .checkout-btn:active { transform: scale(0.97); }
        .cart-footer .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        /* 选择角色弹窗 */
        .mall-role-select-overlay { position: absolute; inset: 0; z-index: 50; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .mall-role-select-overlay.active { display: flex; }
        .mall-role-select-panel { background: var(--bg-card); border-radius: 20px; padding: 20px 20px 24px; max-width: 300px; width: 90%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-role-select-panel h3 { font-size: 17px; color: var(--text-primary); margin-bottom: 4px; }
        .mall-role-select-panel p { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .mall-role-select-panel .role-select-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 200px; overflow-y: auto; }
        .mall-role-select-panel .role-select-btn { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-card); cursor: pointer; font-family: inherit; width: 100%; text-align: left; transition: 0.15s; }
        .mall-role-select-panel .role-select-btn:active { transform: scale(0.97); }
        .mall-role-select-panel .role-select-btn .rs-avatar { width: 32px; height: 32px; border-radius: 50%; background-color: #ff6b81; background-size: cover; background-position: center; flex-shrink: 0; }
        .mall-role-select-panel .role-select-btn .rs-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .mall-role-select-panel .role-select-btn .rs-check { color: #ff6b81; font-size: 18px; }
        .mall-role-select-panel .role-select-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--border-color); }
        .mall-role-select-panel .role-select-cancel { width: 100%; padding: 8px; border: none; border-radius: 10px; background: var(--bg-secondary); color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: inherit; }
        .mall-role-select-panel .role-select-cancel:active { transform: scale(0.97); }
        /* 充值 */
        .mall-recharge-overlay { position: absolute; inset: 0; z-index: 45; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .mall-recharge-overlay.active { display: flex; }
        .mall-recharge-panel { background: var(--bg-card); border-radius: 20px; padding: 20px 20px 20px; max-width: 300px; width: 90%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-recharge-panel h3 { font-size: 17px; color: var(--text-primary); margin-bottom: 2px; }
        .mall-recharge-panel p { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
        .mall-recharge-panel .recharge-input { width: 100%; padding: 8px 12px; border: 2px solid var(--border-color); border-radius: 10px; font-size: 16px; text-align: center; outline: none; background: var(--bg-card); color: var(--text-primary); font-weight: 600; }
        .mall-recharge-panel .recharge-input:focus { border-color: #ff6b81; }
        .mall-recharge-panel .recharge-btns { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; justify-content: center; }
        .mall-recharge-panel .recharge-btns button { padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-secondary); font-size: 13px; cursor: pointer; font-family: inherit; color: var(--text-primary); transition: 0.15s; }
        .mall-recharge-panel .recharge-btns button:active { transform: scale(0.95); }
        .mall-recharge-panel .recharge-btns button .r-amount { font-weight: 700; color: #ff6b81; }
        .mall-recharge-panel .recharge-confirm { width: 100%; padding: 10px; border: none; border-radius: 10px; background: var(--pink-gradient); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s; box-shadow: 0 2px 8px rgba(255,107,129,0.3); }
        .mall-recharge-panel .recharge-confirm:active { transform: scale(0.97); }
        .mall-recharge-panel .recharge-cancel { background: none; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; margin-top: 6px; font-family: inherit; }
        /* Toast */
        .custom-toast { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px; border-radius: 12px; font-size: 13px; z-index: 200; animation: fadeInUp 0.3s ease; text-align: center; max-width: 80%; }
        /* 动画 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @media (max-width: 460px) { .phone-frame { border-radius: 0; height: 100vh; max-height: 100vh; } body { padding: 0; } .mall-product-grid { gap: 6px; } .mall-product-card .product-name { font-size: 11px; } .mall-product-card .product-price { font-size: 12px; } }
    </style>
</head>
<body>
<div class="phone-frame" id="app">
    <!-- ===== 商城主界面 ===== -->
    <div class="screen-mall" id="mallScreen">
        <!-- 头部 -->
        <div class="mall-header">
            <button class="back-btn" id="exitMallBtn"><i class="fas fa-times"></i></button>
            <div class="title"><i class="fas fa-shopping-bag"></i> 造梦</div>
            <div class="mall-actions">
                <span class="mall-balance" id="mallBalanceDisplay">💰 <span id="mallBalanceAmount">1000</span></span>
                <button class="mall-cart-btn" id="mallCartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count empty" id="mallCartCount">0</span>
                </button>
                <button class="mall-invite-btn" id="mallInviteBtn">💕 心爱的TA</button>
            </div>
        </div>
        <!-- Tab -->
        <div class="mall-tabs" id="mallTabs">
            <div class="mall-tab active" data-tab="recommend">推荐</div>
            <div class="mall-tab" data-tab="takeout">外卖</div>
            <div class="mall-tab" data-tab="orders">订单</div>
        </div>
        <!-- 身体 -->

function loadProducts() {
    fetch('./products.json').then(function(resp) {
        if (!resp.ok) throw new Error('加载失败');
        return resp.json();
    }).then(function(data) {
        var all = data.products || [];
        mallProducts = all.filter(function(p) { return p.category === '推荐' || !p.category; });
        mallTakeoutProducts = all.filter(function(p) { return p.category === '外卖'; });
        if (mallProducts.length === 0) mallProducts = DEFAULT_PRODUCTS.slice();
        if (mallTakeoutProducts.length === 0) mallTakeoutProducts = DEFAULT_TAKEOUT.slice();
        renderAll();
    }).catch(function(e) {
        console.log('使用默认商品数据');
        mallProducts = DEFAULT_PRODUCTS.slice();
        mallTakeoutProducts = DEFAULT_TAKEOUT.slice();
        renderAll();
    });
}

// ============================================================
//  渲染
// ============================================================
function renderAll() {
    renderCategories();
    renderTakeoutCategories();
    renderProducts(mallProducts);
    renderTakeoutProducts(mallTakeoutProducts);
    renderOrderRoleSelector();
    renderOrders();
    updateUI();
}

function renderCategories() {
    var filter = document.getElementById('categoryFilter');
    if (!filter) return;
    var tags = ['全部'];
    mallProducts.forEach(function(p) {
        if (p.tag && tags.indexOf(p.tag) === -1) tags.push(p.tag);
    });
    var html = '<button class="cat-btn active" data-cat="全部">全部</button>';
    tags.slice(1, 6).forEach(function(tag) {
        html += '<button class="cat-btn" data-cat="' + tag + '">' + tag + '</button>';
    });
    filter.innerHTML = html;
    filter.querySelectorAll('.cat-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            filter.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            var cat = this.dataset.cat;
            var filtered = cat === '全部' ? mallProducts : mallProducts.filter(function(p) { return p.tag === cat; });
            renderProducts(filtered);
        });
    });
}

function renderTakeoutCategories() {
    var filter = document.getElementById('takeoutCategoryFilter');
    if (!filter) return;
    var tags = ['全部'];
    mallTakeoutProducts.forEach(function(p) {
        if (p.tag && tags.indexOf(p.tag) === -1) tags.push(p.tag);
    });
    var html = '<button class="cat-btn active" data-cat="全部">全部</button>';
    tags.slice(1, 6).forEach(function(tag) {
        html += '<button class="cat-btn" data-cat="' + tag + '">' + tag + '</button>';
    });
    filter.innerHTML = html;
    filter.querySelectorAll('.cat-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            filter.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            var cat = this.dataset.cat;
            var filtered = cat === '全部' ? mallTakeoutProducts : mallTakeoutProducts.filter(function(p) { return p.tag === cat; });
            renderTakeoutProducts(filtered);
        });
    });
}

function renderProducts(products) {
    var grid = document.getElementById('mallProductGrid');
    if (!grid) return;
    if (products.length === 0) {
        grid.innerHTML = '<div class="mall-empty"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
        return;
    }
    var html = '';
    products.forEach(function(p) {
        var tagHtml = p.tag ? '<span class="product-tag default-tag">' + p.tag + '</span>' : '';
        var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" />' : '🛍️';
        html += '<div class="mall-product-card" data-id="' + p.id + '">' + tagHtml + '<div class="product-img">' + imgHtml + '</div><div class="product-name">' + p.name + '</div><div class="product-price">¥' + p.price + '</div></div>';
    });
    grid.innerHTML = html;
    grid.querySelectorAll('.mall-product-card').forEach(function(el) {
        el.addEventListener('click', function() {
            var product = products.find(function(p) { return p.id === el.dataset.id; });
            if (product) openDetail(product);
        });
    });
}

function renderTakeoutProducts(products) {
    var grid = document.getElementById('mallTakeoutGrid');
    if (!grid) return;
    if (products.length === 0) {
        grid.innerHTML = '<div class="mall-empty"><i class="fas fa-utensils"></i><p>暂无外卖</p></div>';
        return;
    }
    var html = '';
    products.forEach(function(p) {
        var tagHtml = p.tag ? '<span class="product-tag default-tag">' + p.tag + '</span>' : '';
        var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" />' : '🍽️';
        html += '<div class="mall-product-card" data-id="' + p.id + '">' + tagHtml + '<div class="product-img">' + imgHtml + '</div><div class="product-name">' + p.name + '</div><div class="product-price">¥' + p.price + '</div></div>';
    });
    grid.innerHTML = html;
    grid.querySelectorAll('.mall-product-card').forEach(function(el) {
        el.addEventListener('click', function() {
            var product = products.find(function(p) { return p.id === el.dataset.id; });
            if (product) openDetail(product);
        });
    });
}

function renderOrderRoleSelector() {
    var sel = document.getElementById('orderRoleSelector');
    if (!sel) return;
    var roles = loadRolesFromMain();
    sel.innerHTML = '';
    if (roles.length === 0) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.textContent = '暂无角色';
        sel.appendChild(opt);
        return;
    }
    roles.forEach(function(r) {
        var opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
    });
    if (currentOrderRoleId && roles.find(function(r) { return r.id === currentOrderRoleId; })) {
        sel.value = currentOrderRoleId;
    } else {
        sel.value = roles[0].id;
        currentOrderRoleId = roles[0].id;
    }
    sel.addEventListener('change', function() {
        currentOrderRoleId = this.value;
        renderOrders();
    });
}

function renderOrders() {
    var list = document.getElementById('mallOrderList');
    if (!list) return;
    var roles = loadRolesFromMain();
    var role = roles.find(function(r) { return r.id === currentOrderRoleId; });
    if (!role) {
        list.innerHTML = '<div class="mall-empty"><i class="fas fa-user"></i><p>请选择一个角色</p></div>';
        return;
    }
    var filtered = mallOrders.filter(function(o) {
        if (currentOrderSubTab === 'received') return o.roleId === role.id && o.mode === 'ai_gift';
        else return o.roleId === role.id && o.mode === 'gift';
    });
    if (filtered.length === 0) {
        var msg = currentOrderSubTab === 'received' ? '还没有收到礼物' : '还没有送出礼物';
        list.innerHTML = '<div class="mall-empty"><i class="fas fa-gift"></i><p>' + msg + '</p></div>';
        return;
    }
    var html = '';
    filtered.slice().reverse().forEach(function(order) {
        var statusMap = { 'pending': '待收', 'done': '已收' };
        var statusClass = { 'pending': 'status-pending', 'done': 'status-done' };
        var itemsText = order.productName + ' ×' + order.qty;
        var dirText = currentOrderSubTab === 'received' ? '收到来自 ' + (order.roleName || role.name) : '送出送给 ' + (order.roleName || role.name);
        var dirIcon = currentOrderSubTab === 'received' ? 'fa-arrow-down' : 'fa-arrow-up';
        html += '<div class="mall-order-item"><div class="order-header"><span class="order-id">' + order.id + '</span><span class="order-time">' + new Date(order.createdAt).toLocaleString() + '</span></div><div class="order-direction"><i class="fas ' + dirIcon + ' dir-icon"></i> ' + dirText + '</div><div class="order-items">' + itemsText + '</div><div class="order-total">¥' + order.total + '</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;"><span class="order-status ' + (statusClass[order.status] || 'status-pending') + '">' + (statusMap[order.status] || '待收') + '</span></div></div>';
    });
    list.innerHTML = html;
}

// ============================================================
//  商品详情
// ============================================================
function openDetail(product) {
    currentDetailProduct = product;
    var overlay = document.getElementById('mallDetailOverlay');
    var body = document.getElementById('mallDetailBody');
    document.getElementById('mallDetailTitle').textContent = product.name;
    var imgHtml = product.image ? '<img src="' + product.image + '" alt="' + product.name + '" />' : '🛍️';
    body.innerHTML = '<div class="detail-img">' + imgHtml + '</div><div class="detail-name">' + product.name + '</div><div class="detail-price">¥' + product.price + '</div><div class="detail-desc">' + (product.description || '暂无描述') + '</div><div class="detail-qty"><label>数量</label><button class="qty-btn" id="detailQtyMinus">−</button><span class="qty-num" id="detailQtyNum">1</span><button class="qty-btn" id="detailQtyPlus">+</button></div><div class="detail-note"><input type="text" id="detailNoteInput" placeholder="给TA的留言..." /></div>';
    overlay.classList.add('active');
    var qty = 1;
    var qtyNum = document.getElementById('detailQtyNum');
    document.getElementById('detailQtyMinus').onclick = function() { if (qty > 1) { qty--; qtyNum.textContent = qty; } };
    document.getElementById('detailQtyPlus').onclick = function() { qty++; qtyNum.textContent = qty; };
    var currentRole = getCurrentRoleFromMain();
    var roleName = currentRole ? currentRole.name : 'TA';
    document.getElementById('mallDetailGiftBtn').textContent = '💝 送给' + roleName;
    document.getElementById('mallDetailBuyBtn').textContent = '💰 购买';
    document.getElementById('mallDetailGiftBtn').onclick = function() {
        var note = document.getElementById('detailNoteInput').value.trim();
        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'gift');
    };
    document.getElementById('mallDetailBuyBtn').onclick = function() {
        var note = document.getElementById('detailNoteInput').value.trim();
        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'buy');
    };
}

function closeDetail() { document.getElementById('mallDetailOverlay').classList.remove('active'); }

// ============================================================
//  购买 / 送礼
// ============================================================
function selectTargetRoleSync() {
    return new Promise(function(resolve) {
        var roles = loadRolesFromMain();
        if (roles.length === 0) { showToast('⚠️ 暂无角色'); resolve(null); return; }
        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');
        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:#ff6b81;';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');
        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                var role = roles.find(function(r) { return r.id === btn.dataset.id; });
                resolve(role);
            };
        });
        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
            resolve(null);
        };
    });
}

function purchaseProduct(product, qty, note, mode) {
    var totalPrice = product.price * qty;
    var currentRole = getCurrentRoleFromMain();
    if (mode === 'gift') {
        selectTargetRoleSync().then(function(selected) {
            if (!selected) return;
            selectedRoleForGift = selected;
            executePurchase(product, qty, note, mode, selected, totalPrice);
        });
        return;
    }
    if (!currentRole) { showToast('⚠️ 请先在主应用中创建角色'); return; }
    executePurchase(product, qty, note, mode, currentRole, totalPrice);
}

function executePurchase(product, qty, note, mode, targetRole, totalPrice) {
    if (!targetRole) { showToast('⚠️ 请选择角色'); return; }
    if (mallBalance < totalPrice) { showToast('💰 余额不足'); return; }
    if (!confirm('💝 确定送给 ' + targetRole.name + '「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice)) return;

    mallBalance -= totalPrice;
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id, productName: product.name, productImage: product.image,
        price: product.price, qty: qty, total: totalPrice, note: note || '',
        mode: mode, roleName: targetRole.name, roleId: targetRole.id,
        status: 'pending', giftFromAi: false,
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    saveMallData();
    closeDetail();
    updateUI();
    showToast('🎁 已送给 ' + targetRole.name + '！');

    // 调用主应用插入礼物卡片（暖阳风格，已送出）
    if (window.addGiftMessageToRole) {
        var giftData = {
            productName: product.name,
            price: product.price,
            desc: product.description || '',
            note: note || '一份心意',
            targetRoleId: targetRole.id,
            targetRoleName: targetRole.name,
        };
        var success = window.addGiftMessageToRole(targetRole.id, 'sent', giftData);
        if (success) {
            showToast('💬 礼物消息已发送到聊天框');
        }
    } else {
        showToast('⚠️ 未检测到主应用，请确保从主应用打开商城');
    }

    // 触发心跳
    triggerHeartSpikeForGift(targetRole, product, 'gift');
    // 触发 AI 回复
    triggerGiftChatReply(targetRole, product, note);
}

// ============================================================
//  心跳 + AI 回复
// ============================================================
function triggerHeartSpikeForGift(role, product, mode) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        var r = data.roles.find(function(ro) { return ro.id === role.id; });
        if (!r) return;
        if (!r.heartData) r.heartData = { value: 65, restingValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
        var spike = mode === 'gift' ? 15 : 10;
        var newVal = Math.min(99, (r.heartData.value || 65) + spike + Math.floor(Math.random() * 5));
        r.heartData.value = newVal;
        r.heartData.peakValue = newVal;
        r.heartData.recentTrigger = '💝 送出了「' + product.name + '」';
        if (data.config && data.config.heart && data.config.heart.bindRoleId === role.id) {
            data.config.heart.value = newVal;
            data.config.heart.peakValue = newVal;
            data.config.heart.recentTrigger = '💝 送出了「' + product.name + '」';
        }
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        showToast('💓 心跳飙升！');
    } catch (_) {}
}

function triggerGiftChatReply(role, product, note) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        var fallbacks = ['哇！谢谢你送我的礼物 💕', '你真好，我好喜欢！', '天哪，你居然送我这个！我好感动 😭', '谢谢你的心意，我会好好珍惜的 💝'];
        var reply = fallbacks[Math.floor(Math.random() * fallbacks.length)];
        showToast('💬 ' + role.name + '：' + reply);
        return;
    }
    var model = getModelFromMain();
    var giftMessage = '用户送了你一份礼物：\n商品名：' + product.name + '\n价格：' + product.price + ' 虚拟币\n描述：' + (product.description || '') + '\n' + (note ? '附言：' + note : '') + '\n\n请用你的性格回应这份礼物。';
    var systemPrompt = '你正在扮演「' + role.name + '」。用户刚刚送了你一份礼物，请根据你的性格（人设：' + (role.persona || '温柔体贴') + '）回应这份礼物。要求：用第一人称「我」说话，表达真实感受，控制在2-4句话。';
    fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: giftMessage }],
            temperature: 0.85,
            max_tokens: 200,
        }),
    }).then(function(resp) {
        if (!resp.ok) throw new Error('API 错误');
        return resp.json();
    }).then(function(data) {
        var reply = data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
        if (reply) {
            showToast('💬 ' + role.name + '：' + reply.substring(0, 40) + (reply.length > 40 ? '...' : ''));
        }
    }).catch(function(e) {
        console.log('送礼回复失败:', e);
    });
}

// ============================================================
//  购物车
// ============================================================
function addToCart(product, qty) {
    var existing = mallCart.find(function(item) { return item.id === product.id; });
    if (existing) { existing.qty += qty; }
    else { mallCart.push({ id: product.id, name: product.name, price: product.price, image: product.image, qty: qty }); }
    saveMallData();
    updateUI();
    showToast('🛒 已加入购物车：' + product.name + ' ×' + qty);
}

function removeFromCart(productId) {
    mallCart = mallCart.filter(function(item) { return item.id !== productId; });
    saveMallData();
    updateUI();
    renderCart();
}

function updateCartQty(productId, delta) {
    var item = mallCart.find(function(i) { return i.id === productId; });
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(productId); return; }
    saveMallData();
    updateUI();
    renderCart();
}

function renderCart() {
    var list = document.getElementById('cartList');
    var totalEl = document.getElementById('cartTotalPrice');
    var balanceEl = document.getElementById('cartBalanceDisplay');
    var checkoutBtn = document.getElementById('cartCheckoutBtn');
    if (mallCart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>购物车是空的</p></div>';
        totalEl.textContent = '¥0';
        balanceEl.textContent = '¥' + mallBalance;
        checkoutBtn.disabled = true;
        return;
    }
    var html = '', total = 0;
    mallCart.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        var imgHtml = item.image ? '<img src="' + item.image + '" alt="' + item.name + '" />' : '🛍️';
        html += '<div class="cart-item"><div class="ci-img">' + imgHtml + '</div><div class="ci-info"><div class="ci-name">' + item.name + '</div><div class="ci-price">¥' + item.price + '</div></div><div class="ci-qty"><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="-1">−</button><span class="qty-num">' + item.qty + '</span><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="1">+</button></div><button class="ci-remove" data-id="' + item.id + '"><i class="fas fa-trash-alt"></i></button></div>';
    });
    list.innerHTML = html;
    totalEl.textContent = '¥' + total;
    balanceEl.textContent = '¥' + mallBalance;
    if (mallBalance < total) {
        balanceEl.classList.add('insufficient');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '💰 余额不足';
    } else {
        balanceEl.classList.remove('insufficient');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = '🧾 去结算';
    }
    list.querySelectorAll('.ci-qty-btn').forEach(function(btn) {
        btn.onclick = function() { updateCartQty(btn.dataset.id, parseInt(btn.dataset.delta)); };
    });
    list.querySelectorAll('.ci-remove').forEach(function(btn) {
        btn.onclick = function() { removeFromCart(btn.dataset.id); };
    });
    checkoutBtn.onclick = checkoutCart;
}

function checkoutCart() {
    if (mallCart.length === 0) return;
    var total = mallCart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
    if (mallBalance < total) { showToast('💰 余额不足，请充值'); return; }
    if (!confirm('🧾 确认结算购物车？\n共 ' + mallCart.length + ' 件商品\n总计 ¥' + total)) return;
    mallBalance -= total;
    var role = getCurrentRoleFromMain();
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productName: mallCart.map(function(i) { return i.name; }).join('、'),
        price: total,
        qty: mallCart.reduce(function(s, i) { return s + i.qty; }, 0),
        total: total,
        roleName: role ? role.name : 'TA',
        roleId: role ? role.id : null,
        status: 'pending',
        mode: 'buy',
        note: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    mallCart = [];
    saveMallData();
    closeCart();
    updateUI();
    showToast('✅ 下单成功！共 ¥' + total);
}

function openCart() {
    document.getElementById('cartOverlay').classList.add('active');
    renderCart();
}
function closeCart() {
    document.getElementById('cartOverlay').classList.remove('active');
}

// ============================================================
//  UI 更新
// ============================================================
function updateUI() {
    var el = document.getElementById('mallBalanceAmount');
    if (el) el.textContent = mallBalance;
    var cartBalance = document.getElementById('cartBalanceDisplay');
    if (cartBalance) cartBalance.textContent = '¥' + mallBalance;
    var count = mallCart.reduce(function(sum, item) { return sum + item.qty; }, 0);
    var badge = document.getElementById('mallCartCount');
    if (badge) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('empty'); }
        else { badge.classList.add('empty'); }
    }
    saveMallData();
}

// ============================================================
//  Tab 切换
// ============================================================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.mall-tab').forEach(function(el) {
        el.classList.toggle('active', el.dataset.tab === tab);
    });
    document.getElementById('tabRecommend').style.display = tab === 'recommend' ? 'block' : 'none';
    document.getElementById('tabTakeout').style.display = tab === 'takeout' ? 'block' : 'none';
    document.getElementById('tabOrders').style.display = tab === 'orders' ? 'flex' : 'none';
    if (tab === 'orders') {
        document.getElementById('tabOrders').style.display = 'flex';
        renderOrders();
    }
}

// ============================================================
//  充值
// ============================================================
function openRecharge() {
    document.getElementById('mallRechargeOverlay').classList.add('active');
    document.getElementById('rechargeInput').value = '100';
}
function closeRecharge() {
    document.getElementById('mallRechargeOverlay').classList.remove('active');
}

// ============================================================
//  选择角色（邀请一起逛，仅UI示意）
// ============================================================
function openRoleSelect() {
    var roles = loadRolesFromMain();
    var overlay = document.getElementById('mallRoleSelectOverlay');
    var list = document.getElementById('mallRoleSelectList');
    if (roles.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:14px;">暂无角色</p>';
        overlay.classList.add('active');
        return;
    }
    var html = '';
    roles.forEach(function(r) {
        var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:#ff6b81;';
        html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
    });
    list.innerHTML = html;
    overlay.classList.add('active');
    list.querySelectorAll('.role-select-btn').forEach(function(btn) {
        btn.onclick = function() {
            overlay.classList.remove('active');
            var role = roles.find(function(r) { return r.id === btn.dataset.id; });
            if (role) {
                var inviteBtn = document.getElementById('mallInviteBtn');
                inviteBtn.textContent = '💕 ' + role.name;
                inviteBtn.classList.add('inviting');
                showToast('💕 已邀请 ' + role.name + ' 一起逛～');
            }
        };
    });
    document.getElementById('mallRoleSelectCancel').onclick = function() {
        overlay.classList.remove('active');
    };
}

// ============================================================
//  退出商城
// ============================================================
function exitMall() {
    // 跳回主应用
    window.location.href = 'index.html';
}

// ============================================================
//  初始化
// ============================================================
function init() {
    loadMallData();
    loadRolesFromMain();
    loadProducts();
    updateUI();

    // Tab 切换
    document.querySelectorAll('.mall-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            switchTab(this.dataset.tab);
        });
    });
    switchTab('recommend');

    // 订单子 Tab
    document.querySelectorAll('.order-sub-tab').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.order-sub-tab').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentOrderSubTab = this.dataset.sub;
            renderOrders();
        });
    });

    // 事件绑定
    document.getElementById('exitMallBtn').addEventListener('click', exitMall);
    document.getElementById('mallCartBtn').addEventListener('click', openCart);
    document.getElementById('cartCloseBtn').addEventListener('click', closeCart);
    document.getElementById('cartOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeCart();
    });
    document.getElementById('mallBalanceDisplay').addEventListener('click', openRecharge);
    document.getElementById('rechargeConfirmBtn').addEventListener('click', function() {
        var amount = parseInt(document.getElementById('rechargeInput').value);
        if (!amount || amount <= 0) { showToast('⚠️ 输入有效金额'); return; }
        mallBalance += amount;
        saveMallData();
        closeRecharge();
        updateUI();
        showToast('💰 充值成功！+¥' + amount);
    });
    document.getElementById('rechargeCancelBtn').addEventListener('click', closeRecharge);
    document.querySelectorAll('.recharge-btns button').forEach(function(btn) {
        btn.onclick = function() { document.getElementById('rechargeInput').value = btn.dataset.amount; };
    });
    document.getElementById('mallInviteBtn').addEventListener('click', openRoleSelect);
    document.getElementById('mallRoleSelectCancel').addEventListener('click', function() {
        document.getElementById('mallRoleSelectOverlay').classList.remove('active');
    });
    document.getElementById('mallDetailBack').addEventListener('click', closeDetail);

    console.log('🌸 造梦 · 商城已启动！');
    console.log('商品数:', mallProducts.length + mallTakeoutProducts.length);
    console.log('余额:', mallBalance);
}

document.addEventListener('DOMContentLoaded', init);
</script>
