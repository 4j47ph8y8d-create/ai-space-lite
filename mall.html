<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>商城 · 造梦</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 430px; height: 780px; background: #faf0ee; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        :root { --bg-primary: #faf0ee; --bg-secondary: #fdf6f5; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #888; --border-color: rgba(0,0,0,0.06); --shadow-color: rgba(232,122,122,0.08); --header-bg: rgba(255,240,240,0.92); --primary-pink: #e87a7a; --primary-pink-light: #f8b4b4; --primary-pink-dark: #d47777; --heart-color: #ff6b81; }
        [data-theme="light"] { --bg-secondary: #fdf6f5; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #888; --border-color: rgba(0,0,0,0.06); --shadow-color: rgba(232,122,122,0.08); --header-bg: rgba(255,240,240,0.95); }

        .screen-mall { width: 100%; height: 100%; background: var(--bg-secondary); display: flex; flex-direction: column; position: absolute; top: 0; left: 0; z-index: 15; }
        .mall-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; flex-shrink: 0; min-height: 52px; flex-wrap: wrap; }
        .mall-header .back-btn { font-size: 20px; color: var(--primary-pink); cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 6px; }
        .mall-header .title i { color: var(--primary-pink); }
        .mall-header .mall-actions { display: flex; align-items: center; gap: 8px; }
        .mall-header .mall-balance { font-size: 13px; color: var(--text-secondary); background: rgba(232,122,122,0.12); padding: 4px 12px; border-radius: 16px; border: 1px solid rgba(232,122,122,0.2); cursor: pointer; transition: 0.15s; }
        .mall-header .mall-balance:active { transform: scale(0.95); }
        .mall-header .mall-balance span { color: var(--primary-pink); font-weight: 700; }
        .mall-header .mall-cart-btn { background: none; border: none; font-size: 20px; color: var(--text-primary); cursor: pointer; position: relative; padding: 4px; }
        .mall-header .mall-cart-btn .cart-count { position: absolute; top: -4px; right: -4px; background: var(--primary-pink); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .mall-header .mall-cart-btn .cart-count.empty { display: none; }
        .mall-header .mall-invite-btn { background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); border: none; color: #fff; padding: 4px 12px; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; white-space: nowrap; }
        .mall-header .mall-invite-btn:active { transform: scale(0.95); }
        .mall-header .mall-invite-btn.inviting { background: #ff6b81; }

        /* Tabs */
        .mall-tabs { display: flex; background: var(--bg-card); border-bottom: 1px solid var(--border-color); flex-shrink: 0; padding: 0 12px; }
        .mall-tabs .tab { flex: 1; text-align: center; padding: 12px 0 10px; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
        .mall-tabs .tab.active { color: var(--primary-pink); border-bottom-color: var(--primary-pink); }
        .mall-tabs .tab:active { opacity: 0.6; }

        .mall-body { flex: 1; overflow-y: auto; padding: 12px 14px 20px; position: relative; }
        .mall-body::-webkit-scrollbar { width: 4px; }
        .mall-body::-webkit-scrollbar-thumb { background: rgba(232,122,122,0.3); border-radius: 4px; }

        /* Product Grid */
        .mall-product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .mall-product-card { background: var(--bg-card); border-radius: 14px; padding: 10px 10px 12px; box-shadow: 0 2px 10px var(--shadow-color); transition: 0.15s; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .mall-product-card:active { transform: scale(0.97); }
        .mall-product-card .product-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 6px; border: 1px solid var(--border-color); overflow: hidden; }
        .mall-product-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-product-card .product-name { font-size: 14px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-product-card .product-price { font-size: 16px; font-weight: 700; color: var(--primary-pink); margin-top: 2px; }
        .mall-product-card .product-tag { position: absolute; top: 8px; left: 8px; font-size: 10px; background: var(--primary-pink); color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .mall-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); grid-column: 1 / -1; }
        .mall-empty i { font-size: 48px; opacity: 0.3; display: block; margin-bottom: 12px; }

        /* Order View */
        .order-header-bar { display: flex; align-items: center; gap: 12px; padding: 8px 0 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 12px; flex-wrap: wrap; }
        .order-header-bar .role-selector { padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-card); font-size: 14px; color: var(--text-primary); outline: none; flex: 1; min-width: 100px; }
        .order-header-bar .role-selector:focus { border-color: var(--primary-pink); }
        .order-header-bar .sub-tabs { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: 8px; padding: 2px; }
        .order-header-bar .sub-tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-secondary); transition: 0.15s; border: none; background: none; font-family: inherit; }
        .order-header-bar .sub-tab.active { background: var(--bg-card); color: var(--primary-pink); box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .order-header-bar .sub-tab:active { transform: scale(0.95); }

        .mall-order-item { background: var(--bg-card); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 6px var(--shadow-color); border-left: 4px solid var(--primary-pink); }
        .mall-order-item .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-wrap: wrap; gap: 4px; }
        .mall-order-item .order-id { font-size: 12px; color: var(--text-secondary); }
        .mall-order-item .order-time { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-status { font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 12px; }
        .mall-order-item .order-status.status-pending { background: #fdcb6e; color: #5a3d1a; }
        .mall-order-item .order-status.status-shipped { background: #74b9ff; color: #fff; }
        .mall-order-item .order-status.status-done { background: var(--primary-pink); color: #fff; }
        .mall-order-item .order-items { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
        .mall-order-item .order-items .oi-gift-tag { color: var(--primary-pink); font-weight: 500; margin-left: 4px; }
        .mall-order-item .order-total { font-size: 15px; font-weight: 600; color: var(--primary-pink); text-align: right; margin-top: 4px; }
        .mall-order-item .order-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .mall-order-item .order-actions button { padding: 4px 14px; border: none; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .mall-order-item .order-actions button:active { transform: scale(0.95); }
        .mall-order-item .order-actions .btn-ship { background: #74b9ff; color: #fff; }
        .mall-order-item .order-actions .btn-done { background: var(--primary-pink); color: #fff; }
        .mall-order-item .order-actions .btn-delete-order { background: #fee; color: #e74c3c; }
        .mall-order-item .order-actions .btn-refund { background: #fdcb6e; color: #5a3d1a; }

        /* 礼物卡片预览 */
        .gift-preview-card { background: linear-gradient(145deg, #fef6f0, #fce4ec); border-radius: 12px; padding: 10px 14px; border: 1px solid rgba(232,122,122,0.12); margin-bottom: 6px; display: flex; align-items: center; gap: 12px; }
        .gift-preview-card .gp-icon { font-size: 24px; }
        .gift-preview-card .gp-info { flex: 1; }
        .gift-preview-card .gp-info .gp-name { font-weight: 600; color: #7a3a3a; }
        .gift-preview-card .gp-info .gp-from { font-size: 12px; color: #8a5a5a; }

        /* 模态框 - 保持原样略调整 */
        .mall-detail-overlay { position: absolute; inset: 0; z-index: 30; background: var(--bg-secondary); display: none; flex-direction: column; animation: fadeInUp 0.25s ease; border-radius: 32px; overflow: hidden; }
        .mall-detail-overlay.active { display: flex; }
        .mall-detail-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-height: 52px; }
        .mall-detail-header .back-btn { font-size: 20px; color: var(--primary-pink); cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-detail-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .mall-detail-body .detail-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 60px; margin-bottom: 14px; }
        .mall-detail-body .detail-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-detail-body .detail-name { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .mall-detail-body .detail-price { font-size: 24px; font-weight: 700; color: var(--primary-pink); margin: 4px 0 10px; }
        .mall-detail-body .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; padding: 12px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); }
        .mall-detail-body .detail-qty { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .mall-detail-body .detail-qty .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .mall-detail-body .detail-qty .qty-btn:active { transform: scale(0.92); }
        .mall-detail-body .detail-qty .qty-num { font-size: 18px; font-weight: 600; color: var(--text-primary); min-width: 30px; text-align: center; }
        .mall-detail-body .detail-note input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); outline: none; font-family: inherit; }
        .mall-detail-body .detail-note input:focus { border-color: var(--primary-pink); }
        .mall-detail-footer { display: flex; gap: 10px; padding: 12px 16px; background: var(--header-bg); border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .mall-detail-footer button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .mall-detail-footer button:active { transform: scale(0.97); }
        .mall-detail-footer .btn-gift { background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); color: #fff; }
        .mall-detail-footer .btn-gift:disabled { opacity: 0.4; cursor: not-allowed; }
        .mall-detail-footer .btn-buy { background: linear-gradient(135deg, #ff6b81, #ee5a24); color: #fff; }
        .mall-detail-footer .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 购物车弹窗简略 */
        .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 40; display: none; justify-content: flex-end; border-radius: 0; overflow: hidden; }
        .cart-overlay.active { display: flex; }
        .cart-drawer { background: var(--bg-card); width: 88%; max-width: 340px; height: 100%; padding: 20px 18px 30px; overflow-y: auto; box-shadow: -4px 0 25px rgba(0,0,0,0.15); animation: slideInRight 0.25s ease; display: flex; flex-direction: column; }
        .cart-drawer .cart-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .cart-drawer .cart-header h3 { font-size: 18px; color: var(--text-primary); }
        .cart-drawer .cart-header .close-cart { font-size: 24px; color: var(--text-secondary); cursor: pointer; background: none; border: none; }
        .cart-drawer .cart-list { flex: 1; overflow-y: auto; padding: 12px 0; }
        .cart-drawer .cart-empty { text-align: center; padding: 40px 0; color: var(--text-secondary); }
        .cart-drawer .cart-empty i { font-size: 40px; opacity: 0.3; display: block; margin-bottom: 10px; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item .ci-img { width: 44px; height: 44px; border-radius: 8px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
        .cart-item .ci-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item .ci-info { flex: 1; }
        .cart-item .ci-info .ci-name { font-size: 14px; color: var(--text-primary); }
        .cart-item .ci-info .ci-price { font-size: 13px; color: var(--primary-pink); font-weight: 600; }
        .cart-item .ci-qty { display: flex; align-items: center; gap: 6px; }
        .cart-item .ci-qty button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .cart-item .ci-qty button:active { transform: scale(0.92); }
        .cart-item .ci-qty .qty-num { font-size: 14px; font-weight: 600; color: var(--text-primary); min-width: 24px; text-align: center; }
        .cart-item .ci-remove { color: #e74c3c; cursor: pointer; font-size: 16px; background: none; border: none; padding: 4px; }
        .cart-footer { border-top: 1px solid var(--border-color); padding-top: 14px; flex-shrink: 0; }
        .cart-footer .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .cart-footer .total-row .total-price { color: var(--primary-pink); }
        .cart-footer .balance-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .cart-footer .balance-row .balance-amount { color: var(--primary-pink); font-weight: 600; }
        .cart-footer .balance-row .balance-amount.insufficient { color: #ff6b81; }
        .cart-footer .checkout-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .cart-footer .checkout-btn:active { transform: scale(0.97); }
        .cart-footer .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 充值 / AI 弹窗简略 */
        .mall-recharge-overlay { position: absolute; inset: 0; z-index: 35; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .mall-recharge-overlay.active { display: flex; }
        .mall-recharge-panel { background: var(--bg-card); border-radius: 20px; padding: 24px 20px 20px; max-width: 320px; width: 90%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-recharge-panel h3 { font-size: 18px; color: var(--text-primary); }
        .mall-recharge-panel .recharge-input { width: 100%; padding: 10px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 18px; text-align: center; outline: none; background: var(--bg-card); color: var(--text-primary); font-weight: 600; }
        .mall-recharge-panel .recharge-input:focus { border-color: var(--primary-pink); }
        .mall-recharge-panel .recharge-btns { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; justify-content: center; }
        .mall-recharge-panel .recharge-btns button { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text-primary); transition: 0.15s; }
        .mall-recharge-panel .recharge-btns button:active { transform: scale(0.95); }
        .mall-recharge-panel .recharge-btns button .r-amount { font-weight: 700; color: var(--primary-pink); }
        .mall-recharge-panel .recharge-confirm { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .mall-recharge-panel .recharge-confirm:active { transform: scale(0.97); }
        .mall-recharge-panel .recharge-cancel { background: none; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; margin-top: 8px; font-family: inherit; }

        .mall-ai-bubble { position: absolute; bottom: 20px; left: 16px; z-index: 25; background: var(--bg-card); border-radius: 20px; padding: 8px 14px 8px 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; align-items: center; gap: 10px; border: 2px solid var(--primary-pink); animation: fadeInUp 0.3s ease; max-width: 75%; }
        .mall-ai-bubble.active { display: flex; }
        .mall-ai-bubble .ai-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; background-color: var(--primary-pink); flex-shrink: 0; border: 2px solid var(--primary-pink); }
        .mall-ai-bubble .ai-text { font-size: 13px; color: var(--text-primary); line-height: 1.4; flex: 1; }
        .mall-ai-bubble .ai-text .ai-name { font-weight: 600; color: var(--primary-pink); }
        .mall-ai-bubble .ai-end-btn { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; padding: 0 2px; }

        .mall-ai-spot-overlay { position: absolute; inset: 0; z-index: 35; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 0; }
        .mall-ai-spot-overlay.active { display: flex; }
        .mall-ai-spot-panel { background: var(--bg-card); border-radius: 20px; padding: 20px; max-width: 350px; width: 92%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-ai-spot-panel .spot-product .spot-img { width: 80px; height: 80px; border-radius: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 6px; }
        .mall-ai-spot-panel .spot-product .spot-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-ai-spot-panel .spot-product .spot-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .mall-ai-spot-panel .spot-product .spot-price { font-size: 15px; font-weight: 700; color: var(--primary-pink); }
        .mall-ai-spot-panel .spot-ai-words { font-size: 15px; color: var(--text-primary); padding: 10px 0; line-height: 1.6; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); margin-bottom: 14px; }
        .mall-ai-spot-panel .spot-ai-words .ai-name-tag { color: var(--primary-pink); font-weight: 600; }
        .mall-ai-spot-panel .spot-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .mall-ai-spot-panel .spot-buttons button { flex: 1; padding: 10px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; min-width: 80px; }
        .mall-ai-spot-panel .spot-buttons button:active { transform: scale(0.95); }
        .mall-ai-spot-panel .spot-buttons .btn-buy-for-him { background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); color: #fff; }
        .mall-ai-spot-panel .spot-buttons .btn-reject { background: var(--bg-secondary); color: var(--text-secondary); }
        .mall-ai-spot-panel .spot-buttons .btn-ai-gift { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
        .mall-ai-spot-panel .spot-buttons .btn-ai-gift:disabled { opacity: 0.4; cursor: not-allowed; }

        .mall-role-select-overlay { position: absolute; inset: 0; z-index: 36; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .mall-role-select-overlay.active { display: flex; }
        .mall-role-select-panel { background: var(--bg-card); border-radius: 20px; padding: 20px; max-width: 300px; width: 90%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-role-select-panel .role-select-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
        .mall-role-select-panel .role-select-btn { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border: 2px solid var(--primary-pink); border-radius: 12px; background: var(--bg-card); cursor: pointer; font-family: inherit; width: 100%; text-align: left; transition: 0.15s; }
        .mall-role-select-panel .role-select-btn:active { transform: scale(0.97); }
        .mall-role-select-panel .role-select-btn .rs-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--primary-pink); background-size: cover; background-position: center; flex-shrink: 0; }
        .mall-role-select-panel .role-select-btn .rs-name { flex: 1; font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .mall-role-select-panel .role-select-btn .rs-check { color: var(--primary-pink); font-size: 20px; }
        .mall-role-select-panel .role-select-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--border-color); }
        .mall-role-select-panel .role-select-cancel { width: 100%; padding: 10px; border: none; border-radius: 12px; background: var(--bg-secondary); color: var(--text-secondary); font-size: 14px; cursor: pointer; font-family: inherit; }

        .gift-receive-overlay { position: absolute; inset: 0; z-index: 37; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .gift-receive-overlay.active { display: flex; }
        .gift-receive-panel { background: var(--bg-card); border-radius: 24px; padding: 24px 20px 20px; max-width: 340px; width: 92%; animation: fadeInUp 0.4s ease; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .gift-receive-panel .gift-icon { font-size: 64px; margin-bottom: 8px; }
        .gift-receive-panel .gift-title { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .gift-receive-panel .gift-product { font-size: 16px; font-weight: 600; color: var(--primary-pink); margin: 4px 0; }
        .gift-receive-panel .gift-ai-words { font-size: 15px; color: var(--text-primary); padding: 10px 0; line-height: 1.6; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); margin-bottom: 14px; }
        .gift-receive-panel .gift-ai-words .ai-name-tag { color: var(--primary-pink); font-weight: 600; }
        .gift-receive-panel .gift-buttons { display: flex; gap: 10px; }
        .gift-receive-panel .gift-buttons button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .gift-receive-panel .gift-buttons button:active { transform: scale(0.95); }
        .gift-receive-panel .gift-buttons .btn-receive { background: linear-gradient(135deg, var(--primary-pink-light), var(--primary-pink)); color: #fff; }
        .gift-receive-panel .gift-buttons .btn-reject-gift { background: var(--bg-secondary); color: var(--text-secondary); }

        .custom-toast { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 14px; z-index: 200; animation: fadeInUp 0.3s ease; text-align: center; max-width: 80%; }

        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @media (max-width: 460px) { .phone-frame { border-radius: 0; height: 100vh; max-height: 100vh; } body { padding: 0; } .mall-product-grid { gap: 8px; } }
    </style>
</head>
<body>
<div class="phone-frame" id="app">
    <div class="screen-mall" id="mallScreen">
        <!-- 头部 -->
        <div class="mall-header">
            <button class="back-btn" id="exitMallBtn"><i class="fas fa-times"></i></button>
            <div class="title"><i class="fas fa-shopping-bag"></i> 商城</div>
            <div class="mall-actions">
                <span class="mall-balance" id="mallBalanceDisplay">💰 <span id="mallBalanceAmount">1000</span></span>
                <button class="mall-cart-btn" id="mallCartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count empty" id="mallCartCount">0</span>

        <!-- Tabs -->
        <div class="mall-tabs" id="mallTabs">
            <span class="tab active" data-tab="recommend">推荐</span>

            <span class="tab" data-tab="order">订单</span>

        <!-- 内容区 -->
        <div class="mall-body" id="mallBody"></div>

        <!-- AI 一起逛气泡 -->
        <div class="mall-ai-bubble" id="mallAiBubble">
            <div class="ai-avatar" id="mallAiAvatar"></div>
            <div class="ai-text" id="mallAiBubbleText"><span class="ai-name" id="mallAiBubbleName">TA</span> 正在和你一起逛...</div>
            <button class="ai-end-btn" id="mallAiEndBtn"><i class="fas fa-times"></i></button>
        </div>

    <!-- 商品详情 -->
    <div class="mall-detail-overlay" id="mallDetailOverlay">
        <div class="mall-detail-header">
            <button class="back-btn" id="mallDetailBack"><i class="fas fa-chevron-left"></i></button>
            <div class="title" id="mallDetailTitle">商品详情</div>
        </div>
        <div class="mall-detail-body" id="mallDetailBody"></div>
        <div class="mall-detail-footer">
            <button class="btn-gift" id="mallDetailGiftBtn">💝 送给TA</button>

    <!-- 购物车 -->

                <div class="balance-row"><span>余额</span><span class="balance-amount" id="cartBalanceDisplay">¥1000</span></div>

    <!-- 充值 -->
    <div class="mall-recharge-overlay" id="mallRechargeOverlay">
        <div class="mall-recharge-panel">
            <h3>💰 充值虚拟币</h3>
            <input class="recharge-input" id="rechargeInput" type="number" value="100" />
            <div class="recharge-btns">
                <button data-amount="50"><span class="r-amount">50</span> 币</button>
                <button data-amount="100"><span class="r-amount">100</span> 币</button>
                <button data-amount="500"><span class="r-amount">500</span> 币</button>
                <button data-amount="1000"><span class="r-amount">1000</span> 币</button>
            </div>
            <button class="recharge-confirm" id="rechargeConfirmBtn">✅ 确认充值</button>

    <!-- AI 看中商品 -->
    <div class="mall-ai-spot-overlay" id="mallAiSpotOverlay">
        <div class="mall-ai-spot-panel">
            <div class="spot-product">
                <div class="spot-img" id="spotProductImg">🛍️</div>
                <div class="spot-name" id="spotProductName">商品名</div>
                <div class="spot-price" id="spotProductPrice">¥0</div>
            </div>
            <div class="spot-ai-words" id="spotAiWords"><span class="ai-name-tag" id="spotAiName">TA</span>：我好喜欢这个...</div>
            <div class="spot-buttons">
                <button class="btn-buy-for-him" id="spotBuyForHimBtn">💝 买给他</button>

    <!-- 收礼物弹窗 -->

            <div class="gift-title">你收到了一份礼物！</div>
            <div class="gift-product" id="giftReceiveProduct">商品名</div>
            <div class="gift-ai-words" id="giftReceiveWords"><span class="ai-name-tag" id="giftReceiveAiName">TA</span>：...</div>
            <div class="gift-buttons">
                <button class="btn-receive" id="giftReceiveBtn">💝 确认收货</button>
                <button class="btn-reject-gift" id="giftRejectBtn">🙅 拒绝</button>

<script>
// ============================================================
//  工具 & 数据读写
// ============================================================
function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4); }
function showToast(msg) {
    var old = document.querySelector('.custom-toast');
    if (old) old.remove();
    var toast = document.createElement('div');
    toast.className = 'custom-toast';
    toast.textContent = msg;
    document.querySelector('.phone-frame').appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2500);
}

function loadMallData() {
    try {
        var raw = localStorage.getItem('mall_data');
        if (raw) { return JSON.parse(raw); }
    } catch (_) {}
    return { balance: 1000, cart: [], orders: [], rechargeHistory: [], aiGiftReceived: [], shoppingTogether: { roleId: null, roleName: '', rejectCount: 0, totalTriggers: 0, cooldownUntil: null, isActive: false, pendingProduct: null } };
}

function saveMallData(data) {
    try { localStorage.setItem('mall_data', JSON.stringify(data)); } catch (_) {}
}

function loadRolesFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) { var data = JSON.parse(raw); return data.roles || []; }
    } catch (_) {}
    return [];
}

function getApiKeyFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) { var data = JSON.parse(raw); return data.config && data.config.apiKey ? data.config.apiKey : ''; }
    } catch (_) {}
    return '';
}

// ============================================================
//  【核心】推送礼物消息到主应用聊天框
// ============================================================
function pushGiftToConversation(roleId, direction, product, note, senderName, receiverName) {
    // direction: 'sent' (用户->AI) 或 'received' (AI->用户)
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) { showToast('⚠️ 未找到主应用数据'); return false; }
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) { showToast('⚠️ 未找到该角色'); return false; }

        var msgId = generateId();
        var timeStr = new Date().toLocaleTimeString();
        var giftData = {
            productName: product.name || '礼物',
            price: product.price || 0,
            description: product.description || '',
            image: product.image || '',
            status: direction === 'sent' ? 'sent' : 'pending',
            note: note || '',
            senderName: senderName || (direction === 'sent' ? '我' : role.name),
            receiverName: receiverName || (direction === 'sent' ? role.name : '我'),
            direction: direction,
        };

        var msgRole = direction === 'sent' ? 'user' : 'assistant';
        var content = '🎁 礼物卡片：' + giftData.productName;

        if (!role.messages) role.messages = [];
        role.messages.push({
            id: msgId,
            role: msgRole,
            type: 'gift',
            content: content,
            giftData: giftData,
            time: timeStr,
        });

        if (direction === 'received') {
            if (!data.config.unreadCount) data.config.unreadCount = {};
            data.config.unreadCount[roleId] = (data.config.unreadCount[roleId] || 0) + 1;
        }

        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));

        // 如果送给 AI，触发心跳、记忆、AI 回复（直接在这里操作主应用数据）
        if (direction === 'sent') {
            triggerHeartAndMemoryForGift(roleId, product, note, data);
        }

        showToast('🎁 礼物已推送到「' + role.name + '」的聊天');
        return true;
    } catch (e) {
        console.error('推送礼物失败:', e);
        showToast('⚠️ 推送礼物失败: ' + e.message);
        return false;
    }
}

// 触发心跳和记忆（直接操作主应用 localStorage）
function triggerHeartAndMemoryForGift(roleId, product, note, mainData) {
    try {
        var role = mainData.roles.find(function(r) { return r.id === roleId; });
        if (!role) return;

        // 心跳飙升
        var spikeAmount = 15 + Math.floor(Math.random() * 10);
        if (!role.heartData) role.heartData = { value: 65, restingValue: 65, peakValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
        var newVal = Math.min(99, (role.heartData.value || 65) + spikeAmount);
        role.heartData.value = newVal;
        role.heartData.peakValue = newVal;
        role.heartData.recentTrigger = '💝 送给你「' + product.name + '」';

        // 记忆
        if (!Array.isArray(role.memory)) role.memory = [];
        var giftText = '💝 我送了「' + product.name + '」给 ' + role.name + (note ? '（附言：' + note + '）' : '');
        var exists = role.memory.some(function(m) { return m.text && m.text.indexOf(product.name) !== -1 && m.text.indexOf('我送') !== -1; });
        if (!exists) {
            role.memory.push({ text: giftText, sourceMessageId: 'gift_' + Date.now() });
        }

        // 同步到 config.heart 如果绑定了该角色
        if (mainData.config && mainData.config.heart && mainData.config.heart.bindRoleId === roleId) {
            mainData.config.heart.value = newVal;
            mainData.config.heart.peakValue = newVal;
            mainData.config.heart.recentTrigger = role.heartData.recentTrigger;
            mainData.config.heart.level = getLevel(newVal);
        }

        localStorage.setItem('ds_multirole_v2', JSON.stringify(mainData));
        showToast('💓 心跳飙升 +' + spikeAmount + '！');

        // 触发 AI 回复（使用 API）
        triggerAIReplyForGift(roleId, product, note);
    } catch (e) { console.error('触发心跳/记忆失败:', e); }
}

function getLevel(value) {
    var levels = [{ max: 20, label: '平静' }, { max: 40, label: '微动' }, { max: 60, label: '心动' }, { max: 80, label: '热烈' }, { max: 95, label: '沸腾' }, { max: 100, label: '灵魂共振' }];
    for (var i = 0; i < levels.length; i++) { if (value <= levels[i].max) return levels[i].label; }
    return '灵魂共振';
}

function triggerAIReplyForGift(roleId, product, note) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        // 无 API Key，用预设回复
        addTextReplyToMain(roleId, '哇！谢谢你送的礼物！我太开心了 💕');
        return;
    }

    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) return;

        var systemPrompt = '你正在扮演「' + role.name + '」。用户刚刚送了你一份礼物：' + product.name + '。请用你的性格（人设：' + (role.persona || '温柔体贴') + '）回应这份礼物。要求：用第一人称「我」说话，表达真实感受，控制在2-4句话。';
        var model = (data.config && data.config.model) || 'deepseek-chat';

        fetch('https://api.deepseek.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({
                model: model,
                messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: '用户送了我「' + product.name + '」' + (note ? '，附言：' + note : '') }],
                temperature: 0.85,
                max_tokens: 200,
            }),
        }).then(function(resp) {
            if (!resp.ok) throw new Error('API 错误');
            return resp.json();
        }).then(function(respData) {
            var reply = respData.choices && respData.choices[0] && respData.choices[0].message && respData.choices[0].message.content;
            if (reply) addTextReplyToMain(roleId, reply);
        }).catch(function(e) {
            console.log('送礼回复失败:', e);
            addTextReplyToMain(roleId, '谢谢你的礼物，我很开心 💕');
        });
    } catch (e) { console.log('触发回复失败:', e); }
}

function addTextReplyToMain(roleId, text) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) return;
        if (!role.messages) role.messages = [];
        role.messages.push({
            id: generateId(),
            role: 'assistant',
            type: 'text',
            content: text,
            time: new Date().toLocaleTimeString()
        });
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        showToast('💬 ' + role.name + '：' + text.substring(0, 30) + (text.length > 30 ? '...' : ''));
    } catch (e) { console.log('添加回复失败:', e); }
}

// ============================================================
//  商城核心变量
// ============================================================
var mallData = loadMallData();
var mallProducts = [];
var currentTab = 'recommend';
var orderSubTab = 'received'; // 'received' 或 'sent'
var selectedOrderRoleId = null;
var currentDetailProduct = null;

// ============================================================
//  加载商品
// ============================================================
function loadProducts() {
    fetch('./products.json').then(function(resp) {
        if (!resp.ok) throw new Error('加载失败');
        return resp.json();
    }).then(function(data) {
        mallProducts = data.products || [];
        renderCurrentTab();
    }).catch(function(e) {
        console.error('加载商品失败:', e);
        mallProducts = [];
        renderCurrentTab();
        showToast('⚠️ 加载商品失败，请检查 products.json');
    });
}

// ============================================================
//  渲染 Tab
// ============================================================
function renderCurrentTab() {
    if (currentTab === 'order') {
        renderOrderView();
    } else {
        renderProductView(currentTab);
    }
}

function renderProductView(category) {
    var body = document.getElementById('mallBody');
    var filtered = mallProducts.filter(function(p) {
        if (category === 'recommend') return p.category === '推荐' || !p.category;
        if (category === 'takeout') return p.category === '外卖';
        return false;
    });

    if (filtered.length === 0) {
        body.innerHTML = '<div class="mall-empty"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
        return;
    }

    var html = '<div class="mall-product-grid">';
    filtered.forEach(function(p) {
        var tagHtml = p.tag ? '<span class="product-tag">' + p.tag + '</span>' : '';
        var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" />' : '🛍️';
        html += '<div class="mall-product-card" data-id="' + p.id + '">' + tagHtml + '<div class="product-img">' + imgHtml + '</div><div class="product-name">' + p.name + '</div><div class="product-price">¥' + p.price + '</div></div>';
    });
    html += '</div>';
    body.innerHTML = html;

    body.querySelectorAll('.mall-product-card').forEach(function(el) {
        el.addEventListener('click', function() {
            var product = mallProducts.find(function(p) { return p.id === el.dataset.id; });
            if (product) openDetail(product);
        });
    });
}

// ============================================================
//  订单视图
// ============================================================
function renderOrderView() {
    var roles = loadRolesFromMain();
    var body = document.getElementById('mallBody');

    // 获取当前角色
    var currentRole = getCurrentRoleFromMain(roles);
    if (!selectedOrderRoleId && currentRole) selectedOrderRoleId = currentRole.id;
    if (!selectedOrderRoleId && roles.length > 0) selectedOrderRoleId = roles[0].id;

    var html = '<div class="order-header-bar">';
    html += '<select class="role-selector" id="orderRoleSelector">';
    roles.forEach(function(r) {
        html += '<option value="' + r.id + '" ' + (r.id === selectedOrderRoleId ? 'selected' : '') + '>' + r.name + '</option>';
    });
    if (roles.length === 0) html += '<option value="">暂无角色</option>';
    html += '</select>';
    html += '<div class="sub-tabs"><button class="sub-tab ' + (orderSubTab === 'received' ? 'active' : '') + '" data-sub="received">我收到的</button><button class="sub-tab ' + (orderSubTab === 'sent' ? 'active' : '') + '" data-sub="sent">他收到的</button></div>';
    html += '</div>';

    // 过滤订单
    var orders = mallData.orders || [];
    var filtered = orders.filter(function(o) {
        if (!selectedOrderRoleId) return false;
        if (orderSubTab === 'received') return o.roleId === selectedOrderRoleId && o.giftFromAi === true;
        if (orderSubTab === 'sent') return o.roleId === selectedOrderRoleId && o.mode === 'gift' && o.giftFromAi !== true;
        return false;
    });

    if (filtered.length === 0) {
        html += '<div class="mall-empty"><i class="fas fa-inbox"></i><p>' + (orderSubTab === 'received' ? '还没有收到礼物' : '还没有送出礼物') + '</p></div>';
    } else {
        filtered.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
        filtered.forEach(function(order) {
            var statusMap = { 'pending': '待收', 'shipped': '已发货', 'done': '已完成' };
            var statusClass = { 'pending': 'status-pending', 'shipped': 'status-shipped', 'done': 'status-done' };

            renderOrderView();
        });
    });

    // 订单操作
    body.querySelectorAll('.btn-refund').forEach(function(btn) {
        btn.onclick = function() { cancelOrder(btn.dataset.id); };
    });
    body.querySelectorAll('.btn-ship').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallData.orders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'shipped'; order.updatedAt = new Date().toISOString(); saveMallData(mallData); renderOrderView(); showToast('🚚 已发货'); }
        };

    body.querySelectorAll('.btn-done').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallData.orders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'done'; order.updatedAt = new Date().toISOString(); saveMallData(mallData); renderOrderView(); showToast('✅ 已确认收货'); }

function cancelOrder(orderId) {
    var order = mallData.orders.find(function(o) { return o.id === orderId; });
    if (!order) { showToast('⚠️ 未找到订单'); return; }
    if (order.status !== 'pending') { showToast('⚠️ 只有待收的订单可以退款'); return; }
    if (order.giftFromAi) { showToast('⚠️ AI 赠送的礼物不能退款'); return; }
    if (confirm('确定取消订单并退款 ¥' + order.total + ' 吗？')) {
        mallData.balance += order.total;
        mallData.orders = mallData.orders.filter(function(o) { return o.id !== orderId; });
        saveMallData(mallData);
        updateUI();
        renderOrderView();
        showToast('✅ 已退款 ¥' + order.total);
    }
}

function getCurrentRoleFromMain(roles) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            var currentId = data.currentRoleId;
            if (currentId) { return roles.find(function(r) { return r.id === currentId; }) || roles[0] || null; }
        }
    } catch (_) {}
    return roles[0] || null;
}

// ============================================================
function purchaseProduct(product, qty, note, mode) {
    var totalPrice = product.price * qty;
    var roles = loadRolesFromMain();
    var targetRole = getCurrentRoleFromMain(roles);

    if (!targetRole) { showToast('⚠️ 请先在主应用中创建角色'); return; }

    if (mode === 'gift') {
        // 送礼模式：选择角色
        selectTargetRole().then(function(selected) {
            if (!selected) return;
            executePurchase(product, qty, note, mode, selected, totalPrice);
        });
        return;
    }

    executePurchase(product, qty, note, mode, targetRole, totalPrice);
}

function selectTargetRole() {
    return new Promise(function(resolve) {
        var roles = loadRolesFromMain();
        if (roles.length === 0) { showToast('⚠️ 暂无角色'); resolve(null); return; }

        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');

        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:var(--primary-pink);';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');

        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                var role = roles.find(function(r) { return r.id === btn.dataset.id; });
                resolve(role);
            };
        });

        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
            resolve(null);
        };
    });
}

function executePurchase(product, qty, note, mode, targetRole, totalPrice) {
    if (!targetRole) { showToast('⚠️ 请选择角色'); return; }
    if (mallData.balance < totalPrice && mode !== 'ai_gift') { showToast('💰 余额不足'); return; }

    var confirmMsg = mode === 'gift' ? '💝 确定送给 ' + targetRole.name + '「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice : '💰 确定购买「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice;
    if (!confirm(confirmMsg)) return;

    if (mode !== 'ai_gift') { mallData.balance -= totalPrice; }

    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id,
        productName: product.name,
        productImage: product.image,
        price: product.price,
        qty: qty,
        total: totalPrice,
        note: note || '',
        mode: mode,
        roleName: targetRole.name,
        roleId: targetRole.id,
        status: 'pending',
        giftFromAi: (mode === 'ai_gift'),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
    };

    mallData.orders.push(order);
    saveMallData(mallData);
    closeDetail();
    updateUI();
    showToast('✅ ' + (mode === 'gift' ? '🎁 已送给 ' + targetRole.name : '购买') + '成功！');

    // 【核心】推送礼物卡片到主应用聊天框
    if (mode === 'gift') {
        pushGiftToConversation(targetRole.id, 'sent', product, note, '我', targetRole.name);
    }
}

// ============================================================
//  AI 一起逛模式（保留原逻辑 + 推送卡片）
// ============================================================
var shoppingTogether = mallData.shoppingTogether || { roleId: null, roleName: '', rejectCount: 0, totalTriggers: 0, cooldownUntil: null, isActive: false, pendingProduct: null };

function startShoppingTogether(roleId) {
    var roles = loadRolesFromMain();
    var role = roles.find(function(r) { return r.id === roleId; });
    if (!role) { showToast('⚠️ 未找到该角色'); return; }

    if (shoppingTogether.cooldownUntil && Date.now() < shoppingTogether.cooldownUntil) {
        var remain = Math.ceil((shoppingTogether.cooldownUntil - Date.now()) / 60000);
        showToast('⏳ ' + role.name + ' 休息中，' + remain + '分钟后可再次邀请');
        return;
    }

    shoppingTogether.roleId = role.id;
    shoppingTogether.roleName = role.name;
    shoppingTogether.rejectCount = 0;
    shoppingTogether.isActive = true;
    shoppingTogether.cooldownUntil = null;
    mallData.shoppingTogether = shoppingTogether;
    saveMallData(mallData);

    document.getElementById('mallInviteBtn').textContent = '💕 ' + role.name + ' 一起逛';
    document.getElementById('mallInviteBtn').classList.add('inviting');

    var bubble = document.getElementById('mallAiBubble');
    var avatar = document.getElementById('mallAiAvatar');
    var nameEl = document.getElementById('mallAiBubbleName');
    if (role.avatar) {
        avatar.style.backgroundImage = 'url(' + role.avatar + ')';
        avatar.style.backgroundSize = 'cover';
        avatar.style.backgroundPosition = 'center';
    } else {
        avatar.style.backgroundImage = '';
        avatar.style.backgroundColor = 'var(--primary-pink)';
    }
    nameEl.textContent = role.name;
    bubble.classList.add('active');
    showToast('💕 已邀请 ' + role.name + ' 一起逛');
}

function endShoppingTogether() {
    if (!shoppingTogether.isActive) return;
    var roleName = shoppingTogether.roleName || 'TA';
    shoppingTogether.isActive = false;
    shoppingTogether.cooldownUntil = Date.now() + 60 * 60 * 1000;
    shoppingTogether.rejectCount = 0;
    mallData.shoppingTogether = shoppingTogether;
    saveMallData(mallData);

    document.getElementById('mallInviteBtn').textContent = '💕 心爱的TA';
    document.getElementById('mallInviteBtn').classList.remove('inviting');
    document.getElementById('mallAiBubble').classList.remove('active');
    document.getElementById('mallAiSpotOverlay').classList.remove('active');
    showToast('👋 已结束和 ' + roleName + ' 的逛街');
}

// AI 看中商品（保留）
function tryTriggerAiSpot(product) {
    if (!shoppingTogether.isActive) return false;
    if (shoppingTogether.rejectCount >= 5) return false;
    if (Math.random() > 0.35) return false;
    // 省略完整 AI 看中逻辑，保持简洁，但会调用 purchaseProduct 并推送卡片
    showToast('💕 ' + shoppingTogether.roleName + ' 看中了「' + product.name + '」！');
    // 简化：直接弹出购买确认
    if (confirm(shoppingTogether.roleName + ' 想要「' + product.name + '」，要买给他吗？¥' + product.price)) {
        var roles = loadRolesFromMain();
        var role = roles.find(function(r) { return r.id === shoppingTogether.roleId; });
        if (role) {
            purchaseProduct(product, 1, 'AI 看中后购买', 'gift');
        }
    }
    return true;
}

function addToCart(product, qty) {
    var existing = mallData.cart.find(function(item) { return item.id === product.id; });
    if (existing) { existing.qty += qty; }
    else { mallData.cart.push({ id: product.id, name: product.name, price: product.price, image: product.image, qty: qty }); }
    saveMallData(mallData);
    updateUI();
    showToast('🛒 已加入购物车');
}

function renderCart() {
    var list = document.getElementById('cartList');
    var totalEl = document.getElementById('cartTotalPrice');
    var balanceEl = document.getElementById('cartBalanceDisplay');
    var checkoutBtn = document.getElementById('cartCheckoutBtn');

    if (mallData.cart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>购物车是空的</p></div>';
        totalEl.textContent = '¥0';
        balanceEl.textContent = '¥' + mallData.balance;
        checkoutBtn.disabled = true;
        return;
    }

    var html = '', total = 0;
    mallData.cart.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        var imgHtml = item.image ? '<img src="' + item.image + '" alt="' + item.name + '" />' : '🛍️';
        html += '<div class="cart-item"><div class="ci-img">' + imgHtml + '</div><div class="ci-info"><div class="ci-name">' + item.name + '</div><div class="ci-price">¥' + item.price + '</div></div><div class="ci-qty"><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="-1">−</button><span class="qty-num">' + item.qty + '</span><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="1">+</button></div><button class="ci-remove" data-id="' + item.id + '"><i class="fas fa-trash-alt"></i></button></div>';
    });
    list.innerHTML = html;
    totalEl.textContent = '¥' + total;
    balanceEl.textContent = '¥' + mallData.balance;

    if (mallData.balance < total) {
        balanceEl.classList.add('insufficient');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '💰 余额不足';
    } else {
        balanceEl.classList.remove('insufficient');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = '🧾 去结算';
    }

    list.querySelectorAll('.ci-qty-btn').forEach(function(btn) {
        btn.onclick = function() {
            var item = mallData.cart.find(function(i) { return i.id === btn.dataset.id; });
            if (!item) return;
            item.qty += parseInt(btn.dataset.delta);
            if (item.qty <= 0) { mallData.cart = mallData.cart.filter(function(i) { return i.id !== btn.dataset.id; }); }
            saveMallData(mallData);
            renderCart();
            updateUI();
        };
    });
    list.querySelectorAll('.ci-remove').forEach(function(btn) {
        btn.onclick = function() {
            mallData.cart = mallData.cart.filter(function(i) { return i.id !== btn.dataset.id; });
            saveMallData(mallData);
            renderCart();
            updateUI();
        };
    });
    checkoutBtn.onclick = function() {
        if (mallData.cart.length === 0) return;
        var total = mallData.cart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
        if (mallData.balance < total) { showToast('💰 余额不足'); return; }
        if (!confirm('结算购物车？共 ¥' + total)) return;
        mallData.balance -= total;
        var roles = loadRolesFromMain();
        var role = getCurrentRoleFromMain(roles);
        var order = {
            id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
            items: mallData.cart.map(function(item) { return { productId: item.id, productName: item.name, productImage: item.image, price: item.price, qty: item.qty }; }),
            total: total,
            roleName: role ? role.name : 'TA',
            roleId: role ? role.id : null,
            status: 'pending',
            giftFromAi: false,
            note: '',
            mode: 'buy',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
        };
        mallData.orders.push(order);
        mallData.cart = [];
        saveMallData(mallData);
        closeCart();
        updateUI();
        showToast('✅ 下单成功！');
    };
}

// ============================================================

// ============================================================
var lastTriggeredProductId = null;
var mallScrollTimeout = null;

function initScrollTrigger() {
    var body = document.getElementById('mallBody');
    if (!body) return;
    var scrollPending = false;
    body.addEventListener('scroll', function() {
        if (!shoppingTogether.isActive) return;
        if (shoppingTogether.rejectCount >= 5) return;
        if (scrollPending) return;
        scrollPending = true;
        clearTimeout(mallScrollTimeout);
        mallScrollTimeout = setTimeout(function() {
            scrollPending = false;
            var cards = body.querySelectorAll('.mall-product-card');
            var targetCard = null;
            var viewportTop = body.scrollTop;
            var viewportBottom = viewportTop + body.clientHeight;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var rect = card.getBoundingClientRect();
                var cardTop = rect.top + body.scrollTop - body.getBoundingClientRect().top;
                var cardBottom = cardTop + rect.height;
                var center = (cardTop + cardBottom) / 2;
                if (center > viewportTop + 100 && center < viewportBottom - 100) {
                    targetCard = card;
                    break;
                }
            }
            if (targetCard) {
                var id = targetCard.dataset.id;
                if (id !== lastTriggeredProductId) {
                    lastTriggeredProductId = id;
                    var product = mallProducts.find(function(p) { return p.id === id; });
                    if (product) tryTriggerAiSpot(product);
                }
            }
        }, 800);
    });
}

        showToast('💰 充值成功！+¥' + amount);
    });
    document.getElementById('rechargeCancelBtn').addEventListener('click', closeRecharge);
    document.querySelectorAll('.recharge-btns button').forEach(function(btn) {
        btn.onclick = function() { document.getElementById('rechargeInput').value = this.dataset.amount; };
    });

    // AI 一起逛
    document.getElementById('mallInviteBtn').addEventListener('click', function() {
        if (shoppingTogether.isActive) {
            endShoppingTogether();
            return;
        }
        var roles = loadRolesFromMain();
        if (roles.length === 0) { showToast('⚠️ 暂无角色'); return; }
        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');
        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:var(--primary-pink);';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');

        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                startShoppingTogether(btn.dataset.id);
            };
        });
        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
        };
    });

    document.getElementById('mallAiEndBtn').addEventListener('click', endShoppingTogether);

    // 商品详情返回
    document.getElementById('mallDetailBack').addEventListener('click', closeDetail);

    // 初始化
    init();
});
</script>
</body>
</html>
