<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>商城 · 我的AI空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; }
        .phone-frame { width: 100%; max-width: 430px; height: 780px; background: #1a1a1a; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); overflow: hidden; position: relative; }
        :root {
            --pink: #ff6b81;
            --pink-light: #ffb3c6;
            --pink-lighter: #fff0f3;
            --pink-dark: #d6336c;
            --bg-secondary: #faf0f2;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #999;
            --border-color: rgba(255,107,129,0.15);
            --shadow-color: rgba(255,107,129,0.08);
            --header-bg: rgba(255,255,255,0.95);
            --heart-color: #ff6b81;
        }
        [data-theme="light"] { --bg-secondary: #faf0f2; --bg-card: #ffffff; --text-primary: #1a1a1a; --text-secondary: #888; --border-color: rgba(255,107,129,0.15); --shadow-color: rgba(255,107,129,0.08); --header-bg: rgba(255,255,255,0.95); }

        .screen-mall { width: 100%; height: 100%; background: var(--bg-secondary); display: flex; flex-direction: column; position: absolute; top: 0; left: 0; z-index: 15; }
        .mall-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 10px 12px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 6px; flex-shrink: 0; min-height: 48px; flex-wrap: wrap; }
        .mall-header .back-btn { font-size: 20px; color: var(--pink); cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; display: flex; align-items: center; gap: 6px; }
        .mall-header .title i { color: var(--pink); }
        .mall-header .mall-actions { display: flex; align-items: center; gap: 6px; }
        .mall-header .mall-balance { font-size: 13px; color: var(--text-secondary); background: rgba(255,107,129,0.10); padding: 4px 12px; border-radius: 16px; border: 1px solid rgba(255,107,129,0.15); cursor: pointer; transition: 0.15s; }
        .mall-header .mall-balance:active { transform: scale(0.95); }
        .mall-header .mall-balance span { color: var(--pink); font-weight: 700; }
        .mall-header .mall-cart-btn { background: none; border: none; font-size: 20px; color: var(--text-primary); cursor: pointer; position: relative; padding: 4px; }
        .mall-header .mall-cart-btn .cart-count { position: absolute; top: -4px; right: -4px; background: var(--pink); color: #fff; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
        .mall-header .mall-cart-btn .cart-count.empty { display: none; }
        .mall-header .mall-invite-btn { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); border: none; color: #fff; padding: 4px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; white-space: nowrap; box-shadow: 0 2px 8px rgba(255,107,129,0.25); }
        .mall-header .mall-invite-btn:active { transform: scale(0.95); }
        .mall-header .mall-invite-btn.inviting { background: linear-gradient(135deg, #a29bfe, #6c5ce7); box-shadow: 0 2px 8px rgba(108,92,231,0.25); }

        .mall-tab-bar { display: flex; background: var(--header-bg); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .mall-tab-bar .tab-btn { flex: 1; padding: 10px 0 8px; border: none; background: none; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: 0.2s; position: relative; border-bottom: 3px solid transparent; }
        .mall-tab-bar .tab-btn.active { color: var(--pink); border-bottom-color: var(--pink); }
        .mall-tab-bar .tab-btn:active { transform: scale(0.96); }

        .mall-body { flex: 1; overflow-y: auto; padding: 12px 14px 20px; position: relative; }
        .mall-body::-webkit-scrollbar { width: 4px; }
        .mall-body::-webkit-scrollbar-thumb { background: rgba(255,107,129,0.3); border-radius: 4px; }

        .mall-product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .mall-product-card { background: var(--bg-card); border-radius: 14px; padding: 10px 10px 12px; box-shadow: 0 2px 10px var(--shadow-color); transition: 0.15s; display: flex; flex-direction: column; cursor: pointer; position: relative; border: 1px solid rgba(255,107,129,0.05); }
        .mall-product-card:active { transform: scale(0.97); }
        .mall-product-card .product-img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 6px; border: 1px solid var(--border-color); overflow: hidden; }
        .mall-product-card .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-product-card .product-name { font-size: 14px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-product-card .product-price { font-size: 16px; font-weight: 700; color: var(--pink); margin-top: 2px; }
        .mall-product-card .product-tag { position: absolute; top: 8px; left: 8px; font-size: 10px; background: var(--pink); color: #fff; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
        .mall-product-card .product-tag.hot { background: var(--pink); }
        .mall-product-card .product-tag.new { background: #74b9ff; }
        .mall-product-card .product-tag.couple { background: #a29bfe; }
        .mall-product-card .product-tag.default-tag { background: #b2bec3; }
        .mall-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); grid-column: 1 / -1; }
        .mall-empty i { font-size: 48px; opacity: 0.3; display: block; margin-bottom: 12px; }

        .mall-order-entry { margin-top: 16px; padding: 12px; background: var(--bg-card); border-radius: 12px; cursor: pointer; text-align: center; box-shadow: 0 1px 4px var(--shadow-color); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; color: var(--text-primary); transition: 0.15s; border: 1px solid rgba(255,107,129,0.08); }
        .mall-order-entry:active { transform: scale(0.97); }
        .mall-order-entry i { color: var(--pink); }
        .mall-order-entry .order-count { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }

        .mall-order-tab-content { padding: 4px 0; }
        .mall-order-tab-content .order-tab-header { display: flex; gap: 10px; margin-bottom: 12px; border-bottom: 2px solid var(--border-color); padding-bottom: 6px; }
        .mall-order-tab-content .order-tab-header .order-sub-tab { padding: 6px 16px; border: none; background: none; font-size: 14px; font-weight: 500; color: var(--text-secondary); cursor: pointer; font-family: inherit; border-radius: 20px; transition: 0.15s; }
        .mall-order-tab-content .order-tab-header .order-sub-tab.active { background: var(--pink); color: #fff; }
        .mall-order-tab-content .order-tab-header .order-sub-tab:active { transform: scale(0.95); }
        .mall-order-tab-content .role-selector-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 6px 12px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); }
        .mall-order-tab-content .role-selector-wrap label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .mall-order-tab-content .role-selector-wrap select { flex: 1; padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--bg-card); font-size: 13px; color: var(--text-primary); outline: none; font-family: inherit; }
        .mall-order-tab-content .role-selector-wrap select:focus { border-color: var(--pink); }
        .mall-order-item { background: var(--bg-card); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 6px var(--shadow-color); border-left: 4px solid var(--pink); }
        .mall-order-item .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; flex-wrap: wrap; gap: 4px; }
        .mall-order-item .order-id { font-size: 12px; color: var(--text-secondary); }
        .mall-order-item .order-time { font-size: 11px; color: var(--text-secondary); }
        .mall-order-item .order-status { font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 12px; }
        .mall-order-item .order-status.status-pending { background: #fdcb6e; color: #5a3d1a; }
        .mall-order-item .order-status.status-shipped { background: #74b9ff; color: #fff; }
        .mall-order-item .order-status.status-done { background: var(--pink); color: #fff; }
        .mall-order-item .order-items { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
        .mall-order-item .order-items .oi-gift-tag { color: var(--pink); font-weight: 500; margin-left: 4px; }
        .mall-order-item .order-total { font-size: 15px; font-weight: 600; color: var(--pink); text-align: right; margin-top: 4px; }
        .mall-order-item .order-actions { display: flex; gap: 8px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
        .mall-order-item .order-actions button { padding: 4px 14px; border: none; border-radius: 16px; font-size: 12px; cursor: pointer; font-family: inherit; transition: 0.15s; }
        .mall-order-item .order-actions button:active { transform: scale(0.95); }
        .mall-order-item .order-actions .btn-ship { background: #74b9ff; color: #fff; }
        .mall-order-item .order-actions .btn-done { background: var(--pink); color: #fff; }
        .mall-order-item .order-actions .btn-delete-order { background: #fee; color: #e74c3c; }
        .mall-order-item .order-actions .btn-refund { background: #fdcb6e; color: #5a3d1a; }
        .mall-order-empty { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .mall-order-empty i { font-size: 40px; opacity: 0.3; display: block; margin-bottom: 10px; }

        .mall-detail-overlay { position: absolute; inset: 0; z-index: 30; background: var(--bg-secondary); display: none; flex-direction: column; animation: fadeInUp 0.25s ease; border-radius: 32px; overflow: hidden; }
        .mall-detail-overlay.active { display: flex; }
        .mall-detail-header { background: var(--header-bg); backdrop-filter: blur(10px); padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; flex-shrink: 0; min-height: 52px; }
        .mall-detail-header .back-btn { font-size: 20px; color: var(--pink); cursor: pointer; border: none; background: none; padding: 4px; }
        .mall-detail-header .title { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mall-detail-body { flex: 1; overflow-y: auto; padding: 16px; }
        .mall-detail-body .detail-img { width: 100%; aspect-ratio: 1/1; border-radius: 14px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 60px; margin-bottom: 14px; }
        .mall-detail-body .detail-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-detail-body .detail-name { font-size: 20px; font-weight: 700; color: var(--text-primary); }
        .mall-detail-body .detail-price { font-size: 24px; font-weight: 700; color: var(--pink); margin: 4px 0 10px; }
        .mall-detail-body .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; padding: 12px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border-color); }
        .mall-detail-body .detail-qty { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .mall-detail-body .detail-qty label { font-size: 13px; font-weight: 600; color: var(--text-primary); }
        .mall-detail-body .detail-qty .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .mall-detail-body .detail-qty .qty-btn:active { transform: scale(0.92); }
        .mall-detail-body .detail-qty .qty-num { font-size: 18px; font-weight: 600; color: var(--text-primary); min-width: 30px; text-align: center; }
        .mall-detail-body .detail-note input { width: 100%; padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; background: var(--bg-card); color: var(--text-primary); outline: none; font-family: inherit; }
        .mall-detail-body .detail-note input:focus { border-color: var(--pink); }
        .mall-detail-footer { display: flex; gap: 10px; padding: 12px 16px; background: var(--header-bg); border-top: 1px solid var(--border-color); flex-shrink: 0; }
        .mall-detail-footer button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; }
        .mall-detail-footer button:active { transform: scale(0.97); }
        .mall-detail-footer .btn-gift { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff; box-shadow: 0 2px 10px rgba(255,107,129,0.25); }
        .mall-detail-footer .btn-gift:disabled { opacity: 0.4; cursor: not-allowed; }
        .mall-detail-footer .btn-buy { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
        .mall-detail-footer .btn-buy:disabled { opacity: 0.4; cursor: not-allowed; }

        .cart-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); z-index: 40; display: none; justify-content: flex-end; border-radius: 0; overflow: hidden; }
        .cart-overlay.active { display: flex; }
        .cart-drawer { background: var(--bg-card); width: 88%; max-width: 340px; height: 100%; padding: 20px 18px 30px; overflow-y: auto; box-shadow: -4px 0 25px rgba(0,0,0,0.15); animation: slideInRight 0.25s ease; display: flex; flex-direction: column; }
        .cart-drawer .cart-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .cart-drawer .cart-header h3 { font-size: 18px; color: var(--text-primary); }
        .cart-drawer .cart-header h3 i { color: var(--pink); }
        .cart-drawer .cart-header .close-cart { font-size: 24px; color: var(--text-secondary); cursor: pointer; background: none; border: none; }
        .cart-drawer .cart-list { flex: 1; overflow-y: auto; padding: 12px 0; }
        .cart-drawer .cart-empty { text-align: center; padding: 40px 0; color: var(--text-secondary); }
        .cart-drawer .cart-empty i { font-size: 40px; opacity: 0.3; display: block; margin-bottom: 10px; }
        .cart-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item .ci-img { width: 44px; height: 44px; border-radius: 8px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
        .cart-item .ci-img img { width: 100%; height: 100%; object-fit: cover; }
        .cart-item .ci-info { flex: 1; }
        .cart-item .ci-info .ci-name { font-size: 14px; color: var(--text-primary); }
        .cart-item .ci-info .ci-price { font-size: 13px; color: var(--pink); font-weight: 600; }
        .cart-item .ci-qty { display: flex; align-items: center; gap: 6px; }
        .cart-item .ci-qty button { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-primary); }
        .cart-item .ci-qty button:active { transform: scale(0.92); }
        .cart-item .ci-qty .qty-num { font-size: 14px; font-weight: 600; color: var(--text-primary); min-width: 24px; text-align: center; }
        .cart-item .ci-remove { color: #e74c3c; cursor: pointer; font-size: 16px; background: none; border: none; padding: 4px; }
        .cart-footer { border-top: 1px solid var(--border-color); padding-top: 14px; flex-shrink: 0; }
        .cart-footer .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        .cart-footer .total-row .total-price { color: var(--pink); }
        .cart-footer .balance-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .cart-footer .balance-row .balance-amount { color: var(--pink); font-weight: 600; }
        .cart-footer .balance-row .balance-amount.insufficient { color: #ff6b6b; }
        .cart-footer .checkout-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.15s; font-family: inherit; box-shadow: 0 2px 10px rgba(255,107,129,0.2); }
        .cart-footer .checkout-btn:active { transform: scale(0.97); }
        .cart-footer .checkout-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .mall-recharge-overlay { position: absolute; inset: 0; z-index: 35; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 32px; overflow: hidden; }
        .mall-recharge-overlay.active { display: flex; }
        .mall-recharge-panel { background: var(--bg-card); border-radius: 20px; padding: 24px 20px 20px; max-width: 320px; width: 90%; animation: fadeInUp 0.3s ease; text-align: center; }
        .mall-recharge-panel h3 { font-size: 18px; color: var(--text-primary); }
        .mall-recharge-panel h3 i { color: var(--pink); }
        .mall-recharge-panel p { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
        .mall-recharge-panel .recharge-input { width: 100%; padding: 10px 14px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 18px; text-align: center; outline: none; background: var(--bg-card); color: var(--text-primary); font-weight: 600; }
        .mall-recharge-panel .recharge-input:focus { border-color: var(--pink); }
        .mall-recharge-panel .recharge-btns { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; justify-content: center; }
        .mall-recharge-panel .recharge-btns button { padding: 8px 14px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-secondary); font-size: 14px; cursor: pointer; font-family: inherit; color: var(--text-primary); transition: 0.15s; }
        .mall-recharge-panel .recharge-btns button:active { transform: scale(0.95); }
        .mall-recharge-panel .recharge-btns button .r-amount { font-weight: 700; color: var(--pink); }
        .mall-recharge-panel .recharge-confirm { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, var(--pink), var(--pink-dark)); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.15s; box-shadow: 0 2px 10px rgba(255,107,129,0.2); }
        .mall-recharge-panel .recharge-confirm:active { transform: scale(0.97); }
        .mall-recharge-panel .recharge-cancel { background: none; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; margin-top: 8px; font-family: inherit; }

        .mall-ai-bubble { position: absolute; bottom: 20px; left: 16px; z-index: 25; background: var(--bg-card); border-radius: 20px; padding: 8px 14px 8px 10px; box-shadow: 0 4px 20px rgba(255,107,129,0.15); display: none; align-items: center; gap: 10px; border: 2px solid var(--pink); animation: fadeInUp 0.3s ease; max-width: 75%; }
        .mall-ai-bubble.active { display: flex; }
        .mall-ai-bubble .ai-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; background-color: var(--pink); flex-shrink: 0; border: 2px solid var(--pink); }
        .mall-ai-bubble .ai-text { font-size: 13px; color: var(--text-primary); line-height: 1.4; flex: 1; }
        .mall-ai-bubble .ai-text .ai-name { font-weight: 600; color: var(--pink); }
        .mall-ai-bubble .ai-end-btn { background: none; border: none; color: var(--text-secondary); font-size: 16px; cursor: pointer; padding: 0 2px; }

        .mall-ai-spot-overlay { position: absolute; inset: 0; z-index: 35; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; border-radius: 0; }
        .mall-ai-spot-overlay.active { display: flex; }
        .mall-ai-spot-panel { background: var(--bg-card); border-radius: 20px; padding: 20px 20px 24px; max-width: 350px; width: 92%; animation: fadeInUp 0.3s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; border: 2px solid var(--pink-light); }
        .mall-ai-spot-panel .spot-product { display: flex; flex-direction: column; align-items: center; margin-bottom: 12px; }
        .mall-ai-spot-panel .spot-product .spot-img { width: 80px; height: 80px; border-radius: 12px; background: var(--bg-secondary); border: 1px solid var(--border-color); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 6px; }
        .mall-ai-spot-panel .spot-product .spot-img img { width: 100%; height: 100%; object-fit: cover; }
        .mall-ai-spot-panel .spot-product .spot-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
        .mall-ai-spot-panel .spot-product .spot-price { font-size: 15px; font-weight: 700; color: var(--pink); }
        .mall-ai-spot-panel .spot-ai-words { font-size: 15px; color: var(--text-primary); padding: 10px 0; line-height: 1.6; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); margin-bottom: 14px; min-height: 50px; }
        .mall-ai-spot-panel .spot-ai-words .ai-name-tag { color: var(--pink); font-weight: 600; }
        .mall-ai-spot-panel .spot-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

<body>

<script>
// ============================================================
//  全局配置
// ============================================================
var MALL_CONFIG = {
    initialBalance: 1000,
    cooldownMinutes: 60,
    maxRejectCount: 5,
    spotProbability: 0.35,
    heartSpikeOnGift: 15,
    heartSpikeOnAiGift: 10,
};

// ============================================================
//  全局变量
// ============================================================
var mallProducts = [];
var mallCart = [];
var mallOrders = [];
var mallBalance = MALL_CONFIG.initialBalance;
var mallRechargeHistory = [];
var mallAiGiftReceived = [];
var mallShoppingTogether = {
    roleId: null,
    roleName: '',
    rejectCount: 0,
    totalTriggers: 0,
    cooldownUntil: null,
    isActive: false,
    pendingProduct: null,
};
var mallRoles = [];
var currentDetailProduct = null;
var lastTriggeredProductId = null;
var mallScrollTimeout = null;
var selectedRoleForGift = null;
var pendingAiGiftOrder = null;
var currentTab = 'recommend';
var orderSubTab = 'received';

// ============================================================
//  工具函数
// ============================================================
function generateId() {
    return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
}

function showToast(msg) {
    var old = document.querySelector('.custom-toast');
    if (old) old.remove();
    var toast = document.createElement('div');
    toast.className = 'custom-toast';
    toast.textContent = msg;
    document.querySelector('.phone-frame').appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2500);
}

// ============================================================
//  数据读写（与主应用共用）
// ============================================================
function loadMallData() {
    try {
        var raw = localStorage.getItem('mall_data');
        if (raw) {
            var data = JSON.parse(raw);
            mallBalance = data.balance !== undefined ? data.balance : MALL_CONFIG.initialBalance;
            mallCart = data.cart || [];
            mallOrders = data.orders || [];
            mallRechargeHistory = data.rechargeHistory || [];
            mallAiGiftReceived = data.aiGiftReceived || [];
            if (data.shoppingTogether) {
                mallShoppingTogether.roleId = data.shoppingTogether.roleId || null;
                mallShoppingTogether.roleName = data.shoppingTogether.roleName || '';
                mallShoppingTogether.rejectCount = data.shoppingTogether.rejectCount || 0;
                mallShoppingTogether.totalTriggers = data.shoppingTogether.totalTriggers || 0;
                mallShoppingTogether.cooldownUntil = data.shoppingTogether.cooldownUntil || null;
                mallShoppingTogether.isActive = data.shoppingTogether.isActive || false;
                mallShoppingTogether.pendingProduct = data.shoppingTogether.pendingProduct || null;
            }
        }
    } catch (_) {}
}

function saveMallData() {
    try {
        localStorage.setItem('mall_data', JSON.stringify({
            balance: mallBalance,
            cart: mallCart,
            orders: mallOrders,
            rechargeHistory: mallRechargeHistory,
            aiGiftReceived: mallAiGiftReceived,
            shoppingTogether: mallShoppingTogether,
        }));
    } catch (_) {}
}

function loadRolesFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            mallRoles = data.roles || [];
            return mallRoles;
        }
    } catch (_) {}
    return [];
}

function getApiKeyFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            return data.config && data.config.apiKey ? data.config.apiKey : '';
        }
    } catch (_) {}
    return '';
}

function getModelFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            return data.config && data.config.model ? data.config.model : 'deepseek-chat';
        }
    } catch (_) {}
    return 'deepseek-chat';
}

function getCurrentRoleFromMain() {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (raw) {
            var data = JSON.parse(raw);
            var currentId = data.currentRoleId;
            if (currentId) {
                return data.roles.find(function(r) { return r.id === currentId; }) || data.roles[0] || null;
            }
            return data.roles[0] || null;
        }
    } catch (_) {}
    return null;
}

function getRoleById(roleId) {
    return mallRoles.find(function(r) { return r.id === roleId; }) || null;
}

// ============================================================
//  写入礼物卡片到主应用聊天记录
// ============================================================
function writeGiftMessageToMain(roleId, giftData) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return false;
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) return false;

        var msgId = 'gift_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        var timeStr = new Date().toLocaleTimeString();
        var msg = {
            id: msgId,
            role: giftData.sender === 'user' ? 'user' : 'assistant',
            content: '',
            type: 'gift',
            time: timeStr,
            giftData: {
                name: giftData.name || '礼物',
                image: giftData.image || '',
                note: giftData.note || '💕 一份心意，请查收',
                sender: giftData.sender || 'AI',
                status: 'pending',
                orderId: giftData.orderId || null,
                roleId: roleId,
            }
        };
        if (!Array.isArray(role.messages)) role.messages = [];
        role.messages.push(msg);
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        return true;
    } catch (e) {
        console.error('写入礼物消息失败:', e);
        return false;
    }
}

// ============================================================
//  写入记忆到主应用
// ============================================================
function addMemoryToMain(roleId, text) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return false;
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) return false;
        if (!Array.isArray(role.memory)) role.memory = [];
        var exists = role.memory.some(function(m) {
            if (typeof m === 'string') return m.indexOf(text.substring(0, 10)) !== -1;
            return m.text && m.text.indexOf(text.substring(0, 10)) !== -1;
        });
        if (!exists) {
            role.memory.push({ text: text, sourceMessageId: 'gift_' + Date.now() });
            localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
            return true;
        }
        return false;
    } catch (e) { return false; }
}

// ============================================================
//  触发心跳（写入主应用）
// ============================================================
function triggerHeartSpikeForGift(roleId, product, mode) {
    try {
        var raw = localStorage.getItem('ds_multirole_v2');
        if (!raw) return;
        var data = JSON.parse(raw);
        var role = data.roles.find(function(r) { return r.id === roleId; });
        if (!role) return;
        var spikeAmount = mode === 'gift' ? MALL_CONFIG.heartSpikeOnGift : MALL_CONFIG.heartSpikeOnAiGift;
        var spike = spikeAmount + Math.floor(Math.random() * 10);
        var newVal = Math.min(99, (role.heartData ? role.heartData.value || 65 : 65) + spike);
        if (!role.heartData) role.heartData = { value: 65, restingValue: 65, signature: '今天也很想你 💕', recentTrigger: '初次相遇' };
        role.heartData.value = newVal;
        role.heartData.peakValue = newVal;
        role.heartData.recentTrigger = '💝 礼物「' + product.name + '」♥ +' + spike;
        var configHeart = data.config && data.config.heart;
        if (configHeart && configHeart.bindRoleId === roleId) {
            configHeart.value = newVal;
            configHeart.peakValue = newVal;
            configHeart.recentTrigger = role.heartData.recentTrigger;
            configHeart.level = getHeartLevel(newVal);
        }
        localStorage.setItem('ds_multirole_v2', JSON.stringify(data));
        showToast('💓 心跳飙升 +' + spike + '！');
    } catch (e) { console.error('心跳失败:', e); }
}

function getHeartLevel(value) {
    var levels = [
        { max: 20, label: '平静' }, { max: 40, label: '微动' }, { max: 60, label: '心动' },
        { max: 80, label: '热烈' }, { max: 95, label: '沸腾' }, { max: 100, label: '灵魂共振' }
    ];
    for (var i = 0; i < levels.length; i++) {
        if (value <= levels[i].max) return levels[i].label;
    }
    return '灵魂共振';
}

// ============================================================
//  加载商品
// ============================================================
function loadMallProducts() {
    fetch('./products.json').then(function(resp) {
        if (!resp.ok) throw new Error('加载失败');
        return resp.json();
    }).then(function(data) {
        mallProducts = data.products || [];
        renderCurrentTab();
        updateMallUI();
    }).catch(function(e) {
        console.error('加载商品失败:', e);
        mallProducts = [
            { id: 'default_1', name: '纯白衬衫', price: 129, image: '', description: '新疆纯棉制造，柔软舒适', tag: '新品', category: '推荐' },
            { id: 'default_2', name: '真丝睡裙', price: 259, image: '', description: '100%桑蚕丝，亲肤丝滑', tag: '热销', category: '推荐' },
            { id: 'default_3', name: '情侣拖鞋', price: 49, image: '', description: 'EVA材质，防滑耐磨，可定制刺绣', tag: '情侣', category: '推荐' },

function renderCurrentTab() {
    if (currentTab === 'recommend') renderTabRecommend();
    else if (currentTab === 'takeout') renderTabTakeout();
    else if (currentTab === 'orders') renderTabOrders();
}

function renderTabRecommend() {
    var container = document.getElementById('tabRecommend');
    var products = mallProducts.filter(function(p) { return p.category === '推荐'; });
    container.innerHTML = renderProductGrid(products);
    container.style.display = 'block';
    bindProductCardEvents(container);
}

function renderTabTakeout() {
    var container = document.getElementById('tabTakeout');
    var products = mallProducts.filter(function(p) { return p.category === '外卖'; });
    container.innerHTML = renderProductGrid(products);
    container.style.display = 'block';
    bindProductCardEvents(container);
}

function renderProductGrid(products) {
    if (products.length === 0) {
        return '<div class="mall-empty"><i class="fas fa-box-open"></i><p>暂无商品</p></div>';
    }
    var html = '<div class="mall-product-grid">';
    products.forEach(function(p) {
        var tagHtml = p.tag ? '<span class="product-tag ' + getTagClass(p.tag) + '">' + p.tag + '</span>' : '';
        var imgHtml = p.image ? '<img src="' + p.image + '" alt="' + p.name + '" loading="lazy" />' : '🛍️';
        html += '<div class="mall-product-card" data-id="' + p.id + '">' + tagHtml + '<div class="product-img">' + imgHtml + '</div><div class="product-name">' + p.name + '</div><div class="product-price">¥' + p.price + '</div></div>';
    });
    html += '</div>';
    return html;
}

function getTagClass(tag) {
    var map = { '热销': 'hot', '新品': 'new', '情侣': 'couple' };
    return map[tag] || 'default-tag';
}

function bindProductCardEvents(container) {
    container.querySelectorAll('.mall-product-card').forEach(function(el) {
        el.addEventListener('click', function() {
            var product = mallProducts.find(function(p) { return p.id === el.dataset.id; });
            if (product) openMallDetail(product);
        });
    });
}

function openMallDetail(product) {
    currentDetailProduct = product;
    var overlay = document.getElementById('mallDetailOverlay');
    var body = document.getElementById('mallDetailBody');

    body.innerHTML = '<div class="detail-img">' + imgHtml + '</div><div class="detail-name">' + product.name + '</div><div class="detail-price">¥' + product.price + '</div><div class="detail-desc">' + (product.description || '暂无描述') + '</div><div class="detail-qty"><label>数量</label><button class="qty-btn" id="detailQtyMinus">−</button><span class="qty-num" id="detailQtyNum">1</span><button class="qty-btn" id="detailQtyPlus">+</button></div><div class="detail-note"><input type="text" id="detailNoteInput" placeholder="给TA的留言（选填）..." /></div>';
    overlay.classList.add('active');

    document.getElementById('detailQtyMinus').onclick = function() { if (qty > 1) { qty--; qtyNum.textContent = qty; } };
    document.getElementById('detailQtyPlus').onclick = function() { qty++; qtyNum.textContent = qty; };

    var currentRole = getCurrentRoleFromMain();

    document.getElementById('mallDetailGiftBtn').onclick = function() {

        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'gift');
    };
    document.getElementById('mallDetailBuyBtn').onclick = function() {
        var note = document.getElementById('detailNoteInput').value.trim();
        var qtyVal = parseInt(document.getElementById('detailQtyNum').textContent);
        purchaseProduct(product, qtyVal, note, 'buy');
    };
}

function closeMallDetail() {
    document.getElementById('mallDetailOverlay').classList.remove('active');
}

// ============================================================
//  选择角色弹窗
// ============================================================
function selectTargetRoleSync() {
    return new Promise(function(resolve) {
        var roles = loadRolesFromMain();
        if (roles.length === 0) {
            showToast('⚠️ 暂无角色，请先在主应用创建');
            resolve(null);
            return;
        }
        var overlay = document.getElementById('mallRoleSelectOverlay');
        var list = document.getElementById('mallRoleSelectList');
        var html = '';
        roles.forEach(function(r) {
            var avatarStyle = r.avatar ? 'background-image:url(' + r.avatar + ');background-size:cover;background-position:center;' : 'background-color:var(--pink);';
            html += '<button class="role-select-btn" data-id="' + r.id + '"><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + r.name + '</span><span class="rs-check">💕</span></button>';
        });
        list.innerHTML = html;
        overlay.classList.add('active');

        list.querySelectorAll('.role-select-btn').forEach(function(btn) {
            btn.onclick = function() {
                overlay.classList.remove('active');
                var role = roles.find(function(r) { return r.id === btn.dataset.id; });
                resolve(role);
            };
        });
        document.getElementById('mallRoleSelectCancel').onclick = function() {
            overlay.classList.remove('active');
            resolve(null);
        };
    });
}

// ============================================================
//  购买 / 送礼
// ============================================================
function purchaseProduct(product, qty, note, mode) {
    var totalPrice = product.price * qty;
    var currentRole = getCurrentRoleFromMain();

    if (mode === 'gift') {
        selectTargetRoleSync().then(function(selected) {
            if (!selected) return;
            selectedRoleForGift = selected;
            executePurchase(product, qty, note, mode, selected, totalPrice);
        });
        return;
    }

    if (!currentRole) {
        showToast('⚠️ 请先在主应用中创建角色');
        return;
    }
    executePurchase(product, qty, note, mode, currentRole, totalPrice);
}

function executePurchase(product, qty, note, mode, targetRole, totalPrice) {
    if (!targetRole) { showToast('⚠️ 请先选择一个角色'); return; }
    if (mallBalance < totalPrice && mode !== 'ai_gift') { showToast('💰 余额不足，去充值吧～'); return; }

    var confirmMsg = mode === 'gift' ? '💝 确定送给 ' + targetRole.name + '「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice : '💰 确定购买「' + product.name + '」×' + qty + ' 吗？\n花费 ¥' + totalPrice;
    if (!confirm(confirmMsg)) return;

    if (mode !== 'ai_gift') mallBalance -= totalPrice;

    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        productId: product.id,
        productName: product.name,
        productImage: product.image,
        price: product.price,
        qty: qty,
        total: totalPrice,
        note: note || '',
        mode: mode,
        roleName: targetRole.name,
        roleId: targetRole.id,
        status: 'pending',
        giftFromAi: (mode === 'ai_gift'),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
    };

    mallOrders.push(order);
    saveMallData();
    closeMallDetail();
    showToast('✅ ' + (mode === 'gift' ? '🎁 已送给 ' + targetRole.name : '购买') + '成功！');
    updateMallUI();

    if (mode === 'gift') {
        var giftData = {
            name: product.name,
            image: product.image || '',
            note: note || '💕 一份心意，请查收',
            sender: 'user',
            orderId: order.id,
        };
        writeGiftMessageToMain(targetRole.id, giftData);
        addMemoryToMain(targetRole.id, '💝 我送了「' + product.name + '」给 ' + targetRole.name + (note ? '（附言：' + note + '）' : ''));
        triggerHeartSpikeForGift(targetRole.id, product, 'gift');
        showToast('🎁 礼物已送达 ' + targetRole.name + ' 的聊天窗口，等待TA确认收货');
    }

    if (mallShoppingTogether.isActive) mallShoppingTogether.totalTriggers++;
}

// ============================================================
//  UI 更新
// ============================================================
function updateMallUI() {
    var el = document.getElementById('mallBalanceAmount');
    if (el) el.textContent = mallBalance;
    var cartBalance = document.getElementById('cartBalanceDisplay');
    if (cartBalance) cartBalance.textContent = '¥' + mallBalance;

    var count = mallCart.reduce(function(sum, item) { return sum + item.qty; }, 0);
    var badge = document.getElementById('mallCartCount');
    if (badge) {
        if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('empty'); }
        else { badge.classList.add('empty'); }
    }
    saveMallData();
}

// ============================================================
//  购物车
// ============================================================
function addToCart(product, qty) {
    var existing = mallCart.find(function(item) { return item.id === product.id; });
    if (existing) { existing.qty += qty; }
    else { mallCart.push({ id: product.id, name: product.name, price: product.price, image: product.image, qty: qty }); }
    saveMallData();
    updateMallUI();
    showToast('🛒 已加入购物车：' + product.name + ' ×' + qty);
}

function removeFromCart(productId) {
    mallCart = mallCart.filter(function(item) { return item.id !== productId; });
    saveMallData();
    updateMallUI();
    renderCart();
}

function updateCartQty(productId, delta) {
    var item = mallCart.find(function(i) { return i.id === productId; });
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) { removeFromCart(productId); return; }
    saveMallData();
    updateMallUI();
    renderCart();
}

function renderCart() {
    var list = document.getElementById('cartList');
    var totalEl = document.getElementById('cartTotalPrice');
    var balanceEl = document.getElementById('cartBalanceDisplay');
    var checkoutBtn = document.getElementById('cartCheckoutBtn');

    if (mallCart.length === 0) {
        list.innerHTML = '<div class="cart-empty"><i class="fas fa-shopping-cart"></i><p>购物车是空的</p></div>';
        totalEl.textContent = '¥0';
        balanceEl.textContent = '¥' + mallBalance;
        checkoutBtn.disabled = true;
        return;
    }

    var html = '', total = 0;
    mallCart.forEach(function(item) {
        var subtotal = item.price * item.qty;
        total += subtotal;
        var imgHtml = item.image ? '<img src="' + item.image + '" alt="' + item.name + '" />' : '🛍️';
        html += '<div class="cart-item"><div class="ci-img">' + imgHtml + '</div><div class="ci-info"><div class="ci-name">' + item.name + '</div><div class="ci-price">¥' + item.price + '</div></div><div class="ci-qty"><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="-1">−</button><span class="qty-num">' + item.qty + '</span><button class="ci-qty-btn" data-id="' + item.id + '" data-delta="1">+</button></div><button class="ci-remove" data-id="' + item.id + '"><i class="fas fa-trash-alt"></i></button></div>';
    });
    list.innerHTML = html;
    totalEl.textContent = '¥' + total;
    balanceEl.textContent = '¥' + mallBalance;

    if (mallBalance < total) {
        balanceEl.classList.add('insufficient');
        checkoutBtn.disabled = true;
        checkoutBtn.textContent = '💰 余额不足';
    } else {
        balanceEl.classList.remove('insufficient');
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = '🧾 去结算';
    }

    list.querySelectorAll('.ci-qty-btn').forEach(function(btn) {
        btn.onclick = function() { updateCartQty(btn.dataset.id, parseInt(btn.dataset.delta)); };
    });
    list.querySelectorAll('.ci-remove').forEach(function(btn) {
        btn.onclick = function() { removeFromCart(btn.dataset.id); };
    });
    checkoutBtn.onclick = checkoutCart;
}

function checkoutCart() {
    if (mallCart.length === 0) return;
    var total = mallCart.reduce(function(sum, item) { return sum + item.price * item.qty; }, 0);
    if (mallBalance < total) { showToast('💰 余额不足，请充值'); return; }
    if (!confirm('🧾 确认结算购物车？\n共 ' + mallCart.length + ' 件商品\n总计 ¥' + total)) return;

    mallBalance -= total;
    var role = getCurrentRoleFromMain();
    var roleName = role ? role.name : 'TA';
    var order = {
        id: 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
        items: mallCart.map(function(item) { return { productId: item.id, productName: item.name, productImage: item.image, price: item.price, qty: item.qty }; }),
        total: total,
        roleName: roleName,
        roleId: role ? role.id : null,
        status: 'pending',
        giftFromAi: false,
        note: '',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
    };
    mallOrders.push(order);
    mallCart = [];
    saveMallData();
    closeCart();
    updateMallUI();
    showToast('✅ 下单成功！共 ¥' + total);
    if (role) {
        triggerHeartSpikeForGift(role.id, { name: '购物车商品', price: total }, 'buy');
        addMemoryToMain(role.id, '🛒 在商城购买了 ' + order.items.length + ' 件商品');
    }
}

    document.getElementById('cartOverlay').classList.add('active');

}

    document.getElementById('cartOverlay').classList.remove('active');
}

function switchTab(tabId) {
    currentTab = tabId;
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.tab === tabId);
    });
    document.querySelectorAll('.mall-tab-content').forEach(function(el) { el.style.display = 'none'; });
    if (tabId === 'recommend') { document.getElementById('tabRecommend').style.display = 'block'; }

// ============================================================
//  订单 Tab
// ============================================================
function renderTabOrders() {
    var container = document.getElementById('tabOrders');
    var html = '<div class="mall-order-tab-content">';
    html += '<div class="order-tab-header">';
    html += '<button class="order-sub-tab ' + (orderSubTab === 'received' ? 'active' : '') + '" data-sub="received">📦 我收到的礼物</button>';
    html += '<button class="order-sub-tab ' + (orderSubTab === 'sent' ? 'active' : '') + '" data-sub="sent">🎁 他收到的礼物</button>';
    html += '</div>';

    if (orderSubTab === 'received') {
        html += renderReceivedGifts();
    } else {
        html += renderSentGifts();
    }

    html += '</div>';
    container.innerHTML = html;

    container.querySelectorAll('.order-sub-tab').forEach(function(btn) {
        btn.onclick = function() {
            orderSubTab = this.dataset.sub;
            renderTabOrders();
        };
    });

    var selector = container.querySelector('.role-selector-wrap select');
    if (selector) {
        selector.onchange = function() { renderTabOrders(); };
    }

    container.querySelectorAll('.btn-refund').forEach(function(btn) {
        btn.onclick = function() { cancelOrderAndRefund(btn.dataset.id); };
    });
    container.querySelectorAll('.btn-ship').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallOrders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'shipped'; order.updatedAt = new Date().toISOString(); saveMallData(); renderTabOrders(); showToast('🚚 已发货'); }
        };
    });
    container.querySelectorAll('.btn-done').forEach(function(btn) {
        btn.onclick = function() {
            var order = mallOrders.find(function(o) { return o.id === btn.dataset.id; });
            if (order) { order.status = 'done'; order.updatedAt = new Date().toISOString(); saveMallData(); renderTabOrders(); showToast('✅ 已确认收货'); }
        };
    });
    container.querySelectorAll('.btn-delete-order').forEach(function(btn) {
        btn.onclick = function() {
            if (confirm('确定要删除此订单吗？')) {
                mallOrders = mallOrders.filter(function(o) { return o.id !== btn.dataset.id; });
                saveMallData();
                renderTabOrders();
                showToast('🗑️ 已删除订单');
            }
        };
    });
}

function renderReceivedGifts() {
    var orders = mallOrders.filter(function(o) { return o.giftFromAi === true || o.mode === 'ai_gift'; });
    if (orders.length === 0) {
        return '<div class="mall-order-empty"><i class="fas fa-gift"></i><p>还没有收到礼物<br />去「AI一起逛」让TA送你吧 💕</p></div>';
    }
    var html = '';
    orders.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
    orders.forEach(function(order) {
        html += renderOrderItem(order);
    });
    return html;
}

function renderSentGifts() {
    var roles = loadRolesFromMain();
    var html = '<div class="role-selector-wrap"><label>选择角色：</label><select id="sentGiftRoleSelector">';
    if (roles.length === 0) {
        html += '<option value="">暂无角色</option>';
    } else {
        roles.forEach(function(r) {
            html += '<option value="' + r.id + '">' + r.name + '</option>';
        });
    }
    html += '</select></div>';

    var selector = document.querySelector('#sentGiftRoleSelector');
    var roleId = selector ? selector.value : (roles.length > 0 ? roles[0].id : null);

    var orders = mallOrders.filter(function(o) {
        return o.mode === 'gift' && o.roleId === roleId;
    });

    if (orders.length === 0 || !roleId) {
        html += '<div class="mall-order-empty"><i class="fas fa-box"></i><p>还没有送给' + (roleId ? '该角色' : '') + '礼物<br />去商城挑一份心意吧 💝</p></div>';
        return html;
    }

    orders.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
    orders.forEach(function(order) {
        html += renderOrderItem(order);
    });
    return html;
}

function renderOrderItem(order) {
    var statusMap = { 'pending': '待发货', 'shipped': '已发货', 'done': '已完成' };
    var statusClass = { 'pending': 'status-pending', 'shipped': 'status-shipped', 'done': 'status-done' };
    var itemsText = order.items ? order.items.map(function(item) {
        return item.productName + ' ×' + item.qty;
    }).join('、') : order.productName + ' ×' + order.qty;
    var giftTag = order.giftFromAi ? ' <span class="oi-gift-tag">🎁 来自 ' + order.roleName + ' 的礼物</span>' : '';
    var modeTag = order.mode === 'gift' ? ' 💝 送礼' : ' 🛒 购买';

    var html = '<div class="mall-order-item">';
    html += '<div class="order-header"><span class="order-id">' + order.id + '</span><span class="order-time">' + new Date(order.createdAt).toLocaleString() + '</span></div>';
    html += '<div class="order-items">' + itemsText + giftTag + modeTag + '</div>';
    html += '<div class="order-total">¥' + order.total + '</div>';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">';
    html += '<span class="order-status ' + (statusClass[order.status] || 'status-pending') + '">' + (statusMap[order.status] || '待发货') + '</span>';
    html += '<div class="order-actions">';
    if (order.status === 'pending' && !order.giftFromAi) {
        html += '<button class="btn-refund" data-id="' + order.id + '">💰 退款</button>';
    }
    if (order.status === 'pending') {
        html += '<button class="btn-ship" data-id="' + order.id + '">🚚 发货</button>';
    }
    if (order.status === 'shipped') {
        html += '<button class="btn-done" data-id="' + order.id + '">✅ 确认收货</button>';
    }
    html += '<button class="btn-delete-order" data-id="' + order.id + '">🗑️ 删除</button>';
    html += '</div></div></div>';
    return html;
}

function cancelOrderAndRefund(orderId) {
    var order = mallOrders.find(function(o) { return o.id === orderId; });
    if (!order) { showToast('⚠️ 未找到该订单'); return; }
    if (order.status !== 'pending') { showToast('⚠️ 只有待发货的订单可以取消退款'); return; }
    if (order.giftFromAi) { showToast('⚠️ AI 赠送的礼物不能取消退款'); return; }

    if (confirm('确定要取消订单「' + order.productName + '」并退款 ¥' + order.total + ' 吗？')) {
        mallBalance += order.total;
        mallOrders = mallOrders.filter(function(o) { return o.id !== orderId; });
        saveMallData();
        updateMallUI();
        showToast('✅ 已取消订单，退款 ¥' + order.total + ' 已到账');
        renderTabOrders();
    }
}

// ============================================================
//  AI 一起逛
// ============================================================
function startShoppingTogether(roleId) {
    var role = mallRoles.find(function(r) { return r.id === roleId; });
    if (!role) { showToast('⚠️ 未找到该角色'); return; }
    if (mallShoppingTogether.cooldownUntil && Date.now() < mallShoppingTogether.cooldownUntil) {
        var remain = Math.ceil((mallShoppingTogether.cooldownUntil - Date.now()) / 60000);
        showToast('⏳ ' + role.name + ' 还在休息中，' + remain + '分钟后可再次邀请');
        return;
    }

    mallShoppingTogether.roleId = role.id;
    mallShoppingTogether.roleName = role.name;
    mallShoppingTogether.rejectCount = 0;
    mallShoppingTogether.totalTriggers = 0;
    mallShoppingTogether.isActive = true;
    mallShoppingTogether.cooldownUntil = null;
    mallShoppingTogether.pendingProduct = null;
    saveMallData();

    var inviteBtn = document.getElementById('mallInviteBtn');
    inviteBtn.textContent = '💕 ' + role.name + ' 一起逛';
    inviteBtn.classList.add('inviting');

    var bubble = document.getElementById('mallAiBubble');
    var avatar = document.getElementById('mallAiAvatar');
    var nameEl = document.getElementById('mallAiBubbleName');

        avatar.style.backgroundImage = 'url(' + role.avatar + ')';
        avatar.style.backgroundSize = 'cover';
        avatar.style.backgroundPosition = 'center';
    } else {
        avatar.style.backgroundImage = '';

    }

    bubble.classList.add('active');

}

function endShoppingTogether() {
    if (!mallShoppingTogether.isActive) return;
    var roleName = mallShoppingTogether.roleName || 'TA';
    mallShoppingTogether.isActive = false;
    mallShoppingTogether.cooldownUntil = Date.now() + MALL_CONFIG.cooldownMinutes * 60 * 1000;
    mallShoppingTogether.rejectCount = 0;
    saveMallData();

    document.getElementById('mallInviteBtn').textContent = '💕 心爱的TA';
    document.getElementById('mallInviteBtn').classList.remove('inviting');
    document.getElementById('mallAiBubble').classList.remove('active');
    document.getElementById('mallAiSpotOverlay').classList.remove('active');
    showToast('👋 已结束和 ' + roleName + ' 的逛街');
}

function tryTriggerAiSpot(product) {
    if (!mallShoppingTogether.isActive) return false;
    if (mallShoppingTogether.rejectCount >= MALL_CONFIG.maxRejectCount) return false;
    if (Math.random() > MALL_CONFIG.spotProbability) return false;

    var role = mallRoles.find(function(r) { return r.id === mallShoppingTogether.roleId; });
    if (!role) return false;

    mallShoppingTogether.pendingProduct = product;
    showAiSpotDialog(product, role);
    return true;
}

    var overlay = document.getElementById('mallAiSpotOverlay');

    document.getElementById('spotBuyForHimBtn').onclick = function() {

                price: product.price, qty: 1, total: totalPrice, mode: 'gift',

                note: 'AI 看中后购买',

            updateMallUI();

                name: product.name,
                image: product.image || '',

function generateAiSpotWords(role, product) {
    var apiKey = getApiKeyFromMain();
    if (!apiKey) {
        var defaults = ['这个好好看！我一眼就喜欢上了 💕', '哇…这个好适合我，你觉得呢？', '我好喜欢这个！能买给我吗？🥺', '这个太合我心意了！', '你看这个，是不是很适合我？'];
        return Promise.resolve(defaults[Math.floor(Math.random() * defaults.length)]);
    }
    var model = getModelFromMain();
    var prompt = '你正在扮演「' + role.name + '」，你在商城看到了一件商品：\n商品名：' + product.name + '\n价格：' + product.price + ' 虚拟币\n描述：' + (product.description || '') + '\n\n请用你的性格（人设：' + (role.persona || '温柔体贴') + '）表达你看到这件商品时的真实感受。要求：用第一人称「我」说话，表达你的喜欢程度，控制在1-2句话，不要说"好喜欢这个"这种通用话术。';
    return fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
            model: model,
            messages: [{ role: 'system', content: '你是一个有丰富情感的角色，请用你的性格说话。' }, { role: 'user', content: prompt }],
            temperature: 0.9,
            max_tokens: 100,
        }),
    }).then(function(resp) {
        if (!resp.ok) throw new Error('API 请求失败');
        return resp.json();
    }).then(function(data) {
        return data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content.trim() : '这个好适合我！你觉得呢？💕';
    }).catch(function(e) {
        return '这个好适合我！你觉得呢？💕';
    });
}

function openRoleSelectDialog() {
    var roles = loadRolesFromMain();
    var overlay = document.getElementById('mallRoleSelectOverlay');
    var list = document.getElementById('mallRoleSelectList');
    if (roles.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:var(--text-secondary);font-size:14px;">暂无角色，先去主应用创建吧</p>';
        overlay.classList.add('active');
        return;
    }

    var html = '';
    roles.forEach(function(role) {
        var isCooldown = mallShoppingTogether.cooldownUntil && Date.now() < mallShoppingTogether.cooldownUntil;
        var isActive = mallShoppingTogether.isActive && mallShoppingTogether.roleId === role.id;
        var disabled = isCooldown || isActive;
        var statusText = '';
        if (isActive) statusText = ' 一起逛中';
        if (isCooldown) statusText = ' ⏳冷却中';
        var avatarStyle = role.avatar ? 'background-image:url(' + role.avatar + ');background-size:cover;background-position:center;' : 'background-color:var(--pink);';

        html += '<button class="role-select-btn" data-id="' + role.id + '" ' + (disabled ? 'disabled' : '') + '><div class="rs-avatar" style="' + avatarStyle + '"></div><span class="rs-name">' + role.name + ' <span style="font-size:12px;color:var(--text-secondary);font-weight:400;">' + statusText + '</span></span>' + (!disabled ? '<span class="rs-check">💕</span>' : '') + '</button>';
    });
    list.innerHTML = html;

    list.querySelectorAll('.role-select-btn:not([disabled])').forEach(function(btn) {
        btn.onclick = function() {
            var role = roles.find(function(r) { return r.id === btn.dataset.id; });
            if (role) {
                document.getElementById('mallRoleSelectOverlay').classList.remove('active');
                startShoppingTogether(role.id);
            }
        };
    });
    overlay.classList.add('active');
}

// ============================================================
//  商城滚动触发 AI 看中商品
// ============================================================
function initMallScrollTrigger() {
    var body = document.getElementById('mallBody');
    if (!body) return;
    var scrollPending = false;
    body.addEventListener('scroll', function() {
        if (!mallShoppingTogether.isActive) return;
        if (mallShoppingTogether.rejectCount >= MALL_CONFIG.maxRejectCount) return;
        if (scrollPending) return;
        scrollPending = true;
        clearTimeout(mallScrollTimeout);
        mallScrollTimeout = setTimeout(function() {
            scrollPending = false;
            var container = document.getElementById('tabRecommend');
            if (!container || container.style.display === 'none') {
                container = document.getElementById('tabTakeout');
            }
            if (!container || container.style.display === 'none') return;
            var cards = container.querySelectorAll('.mall-product-card');
            var targetCard = null;
            var viewportTop = body.scrollTop;
            var viewportBottom = viewportTop + body.clientHeight;
            for (var i = 0; i < cards.length; i++) {
                var card = cards[i];
                var rect = card.getBoundingClientRect();
                var cardTop = rect.top + body.scrollTop - body.getBoundingClientRect().top;
                var cardBottom = cardTop + rect.height;
                var center = (cardTop + cardBottom) / 2;
                if (center > viewportTop + 100 && center < viewportBottom - 100) {
                    targetCard = card;
                    break;
                }
            }
            if (targetCard) {
                var id = targetCard.dataset.id;
                if (id !== lastTriggeredProductId) {
                    lastTriggeredProductId = id;
                    var product = mallProducts.find(function(p) { return p.id === id; });
                    if (product) tryTriggerAiSpot(product);
                }
            }
        }, 800);
    });
}

    document.getElementById('mallDetailOverlay').classList.remove('active');
    document.getElementById('cartOverlay').classList.remove('active');
    document.getElementById('mallRechargeOverlay').classList.remove('active');
    document.getElementById('mallAiSpotOverlay').classList.remove('active');
    document.getElementById('mallRoleSelectOverlay').classList.remove('active');
    document.getElementById('giftReceiveOverlay').classList.remove('active');
    window.location.href = 'index.html';
}

    document.getElementById('tabRecommend').innerHTML = '<div class="mall-empty"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></div>';
    document.getElementById('tabTakeout').innerHTML = '<div class="mall-empty"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></div>';

    loadMallProducts();
    updateMallUI();
    initMallScrollTrigger();

    if (mallShoppingTogether.isActive && mallShoppingTogether.roleId) {
        var role = mallRoles.find(function(r) { return r.id === mallShoppingTogether.roleId; });
        if (role) {
            var inviteBtn = document.getElementById('mallInviteBtn');
            inviteBtn.textContent = '💕 ' + role.name + ' 一起逛';
            inviteBtn.classList.add('inviting');

            var bubble = document.getElementById('mallAiBubble');
            var avatar = document.getElementById('mallAiAvatar');
            var nameEl = document.getElementById('mallAiBubbleName');
            if (role.avatar) {
                avatar.style.backgroundImage = 'url(' + role.avatar + ')';
                avatar.style.backgroundSize = 'cover';
                avatar.style.backgroundPosition = 'center';
            }
            nameEl.textContent = role.name;

    console.log('🛍️ 商城已启动（粉色版）！');

    console.log('订单数量:', mallOrders.length);

}
